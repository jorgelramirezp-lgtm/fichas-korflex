/* ========== SEARCH DROPDOWN ========== */
function SearchDd({value,onChange,options,placeholder,showAdminBtns,onAdminAdd,onAdminEdit,onAdminDel}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const [ai,setAi]=useState(-1);
  const wrap=useRef(),inp=useRef(),list=useRef();

  useEffect(()=>{
    const h=e=>{if(wrap.current&&!wrap.current.contains(e.target)){setOpen(false);setQ("");}};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);

  const filtered=useMemo(()=>{
    if(!q.trim())return options.map(o=>({t:o,sc:0}));
    return options.map(o=>({t:o,...fuzzy(o,q)})).filter(r=>r.ok).sort((a,b)=>b.sc-a.sc);
  },[options,q]);

  const pick=v=>{onChange(v);setOpen(false);setQ("");setAi(-1);};
  const onKey=e=>{
    if(!open){setOpen(true);return;}
    if(e.key==="ArrowDown"){e.preventDefault();setAi(i=>Math.min(i+1,filtered.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();setAi(i=>Math.max(i-1,0));}
    else if(e.key==="Enter"){e.preventDefault();if(ai>=0&&ai<filtered.length)pick(filtered[ai].t);else if(filtered.length===1)pick(filtered[0].t);}
    else if(e.key==="Escape"){setOpen(false);setQ("");}
  };
  useEffect(()=>{if(list.current&&ai>=0){const el=list.current.children[ai+1];if(el)el.scrollIntoView({block:"nearest"});};},[ai]);

  return(
    <div className="sd-wrap" ref={wrap}>
      <input ref={inp} className={"sd-inp"+(value&&!open?" filled":"")}
        value={open?q:(value||"")}
        onChange={e=>{setQ(e.target.value);setOpen(true);setAi(-1);}}
        onFocus={()=>{setOpen(true);setQ("");setAi(-1);}}
        onKeyDown={onKey}
        placeholder={placeholder||(value||"Buscar...")} autoComplete="off"/>
      {value&&!open&&<button className="sd-x" onClick={e=>{e.stopPropagation();onChange("");inp.current?.focus();}}>&times;</button>}
      {open&&<div className="sd-list" ref={list}>
        <div className="sd-meta">
          <span>{filtered.length} de {options.length}</span>
          {showAdminBtns&&<button className="btn btn-sm btn-orange" onClick={e=>{e.stopPropagation();setOpen(false);if(onAdminAdd)onAdminAdd(q||"");}}>+ Nuevo</button>}
        </div>
        {filtered.length===0&&<div className="sd-empty">Sin resultados para "{q}"</div>}
        {filtered.map((it,i)=>(
          <div key={it.t} className={"sd-item"+(i===ai?" act":"")} onMouseEnter={()=>setAi(i)}>
            <span onClick={()=>pick(it.t)} style={{flex:1,cursor:"pointer"}}>{q?hilite(it.t,q):it.t}</span>
            {showAdminBtns&&<span style={{display:"flex",gap:3,flexShrink:0}}>
              <button className="btn btn-sm btn-blue" onClick={e=>{e.stopPropagation();setOpen(false);if(onAdminEdit)onAdminEdit(it.t);}}>&#9998;</button>
              <button className="btn btn-sm btn-red" onClick={e=>{e.stopPropagation();setOpen(false);if(onAdminDel)onAdminDel(it.t);}}>&times;</button>
            </span>}
          </div>
        ))}
      </div>}
    </div>
  );
}

/* ========== BASIC INPUTS ========== */
function FRow({label,children,w,revField,srcField,onValidate}){
  const hasTag=revField||srcField;
  const isRev=!!revField;
  const bg=isRev?"#FFCDD2":"#FFF9C4";
  const col=isRev?"#B71C1C":"#F57F17";
  const bdr=isRev?"#E53935":"#FBC02D";
  const txt=isRev?"REV ✓":"PDF ✓";
  return <div className="field-row"><span className="field-label" style={w?{minWidth:w}:{}}>{label}</span>{children}{hasTag&&<button onClick={onValidate} title={"Validar "+(revField||srcField)} style={{background:bg,color:col,border:"1.5px solid "+bdr,borderRadius:4,fontSize:9,fontWeight:800,padding:"1px 5px",marginLeft:3,cursor:"pointer",whiteSpace:"nowrap",lineHeight:"16px"}}>{txt}</button>}</div>;
}
function FInp({label,value,onChange,ph,w,revField,srcField,onValidate}){
  return <FRow label={label} w={w} revField={revField} srcField={srcField} onValidate={onValidate}><input className="field-inp" value={value} onChange={e=>onChange(e.target.value)} placeholder={ph||""}/></FRow>;
}
function FChk({label,checked,onChange}){
  return <label className="chk"><input type="checkbox" checked={checked} onChange={e=>onChange(e.target.checked)}/>{label}</label>;
}

function lsLoad(key,fallback){
  try{const s=localStorage.getItem(key);if(s){return JSON.parse(s);}}catch(e){}
  return fallback;
}
function lsSave(key,val){
  try{
    const data=JSON.stringify(val);
    localStorage.setItem(key,data);
    // Check total localStorage usage
    let total=0;try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);total+=localStorage.getItem(k).length;}}catch(e){}
    const maxBytes=5*1024*1024; // 5MB typical limit
    const pct=Math.round((total/maxBytes)*100);
    if(pct>80){
      const warn=document.getElementById("ls-warning");
      if(warn)warn.style.display="flex";
      console.warn("localStorage al "+pct+"% ("+Math.round(total/1024)+"KB de ~5MB)");
    }
  }catch(e){
    alert("ERROR: No se pudo guardar. El almacenamiento está lleno.\n\nExporta tu JSON como backup inmediatamente.");
  }
}
function initData(){
  const storedVer=lsLoad(LS_VER,0);
  const isNew=storedVer<DATA_VERSION;
  // --- FICHAS ---
  let fichas=lsLoad(LS_FICHAS,null);
  if(!fichas){
    fichas=[...BASE_FICHAS];
  } else if(isNew){
    // Versión nueva → merge inteligente campo por campo
    const baseMap={};BASE_FICHAS.forEach(b=>baseMap[b.id]=b);
    fichas=fichas.map(f=>{
      const base=baseMap[f.id];
      if(!base) return f; // ficha creada por el usuario, no tocar
      // Merge inteligente: base como punto de partida, preservar datos no-vacíos del almacenado
      const merged={...base,_saved:new Date().toISOString()};
      for(const k of Object.keys(f)){
        if(k==="id"||k==="_saved") continue;
        const fv=f[k], bv=base[k];
        const fEmpty=fv===""||fv===false||fv===null||fv===undefined||(Array.isArray(fv)&&fv.length===0);
        const bEmpty=bv===""||bv===false||bv===null||bv===undefined||(Array.isArray(bv)&&bv.length===0);
        // Si el almacenado tiene valor → preservarlo (ya sea editado por usuario o por migración)
        if(!fEmpty) merged[k]=fv;
        // Si ambos tienen valor: userEdited → prioridad usuario, sino → prioridad base
        else if(!fEmpty && !bEmpty) merged[k]=f._userEdited?fv:bv;
      }
      // _rev y _src: respetar lo que el almacenado tiene (puede haberlos limpiado)
      merged._rev=f._rev||base._rev||[];
      merged._src=f._src||base._src||{};
      return merged;
    });
    // Añadir fichas base nuevas que no existan
    const ids=new Set(fichas.map(f=>f.id));
    for(const b of BASE_FICHAS){if(!ids.has(b.id))fichas.push(b);}
    // --- MIGRACIONES FORZADAS (correcciones específicas) ---
    fichas=fichas.map(f=>{
      // V55: Limpiar campos obsoletos de _rev (Regla 8: gar, peg, emb eliminados)
      // y campos que no necesitan revisión si ya están completos
      if(f._rev&&f._rev.length>0){
        const OBSOLETE_FIELDS=["gar","peg","emb"];
        const autoClean=[];
        // pl_comp no necesita revisión si pl_mats tiene contenido
        if(f._rev.includes("pl_comp")&&f.pl_mats&&f.pl_mats.length>0)autoClean.push("pl_comp");
        // nu_comp no necesita revisión si nu_desc tiene contenido
        if(f._rev.includes("nu_comp")&&f.nu_desc)autoClean.push("nu_comp");
        // nu_mue/nu_esp no necesita revisión si alguno está marcado
        if(f._rev.includes("nu_mue")&&(f.nu_mue||f.nu_esp))autoClean.push("nu_mue");
        if(f._rev.includes("nu_esp")&&(f.nu_mue||f.nu_esp))autoClean.push("nu_esp");
        // nu_sop/nu_peri no son siempre necesarios
        if(f._rev.includes("nu_sop")&&!f.nu_mue)autoClean.push("nu_sop");
        if(f._rev.includes("nu_peri")&&!f.nu_mue)autoClean.push("nu_peri");
        // as_n: si no hay info de asas, el campo vacío es correcto (no todas las fichas tienen asas)
        if(f._rev.includes("as_n")&&!f.as_bord&&!f.as_seri&&!f.as_det&&!f.as_horiz&&!f.as_vert)autoClean.push("as_n");
        // nu_desc/nu_alt: limpiar si ya tienen datos
        if(f._rev.includes("nu_desc")&&f.nu_desc)autoClean.push("nu_desc");
        if(f._rev.includes("nu_alt")&&f.nu_alt)autoClean.push("nu_alt");
        // nu_esp/nu_mue: auto-detectar tipo de núcleo si es evidente
        if((f._rev.includes("nu_esp")||f._rev.includes("nu_mue"))&&f.nu_desc&&!f.nu_mue&&!f.nu_esp){
          const _nd=((f.nu_desc||"")+" "+((f.nu_comp||[]).map(c=>typeof c==="string"?c:(c.mat||"")).join(" "))).toUpperCase();
          if(/BOX|CARCASA|ENSACADO|MUELLES|MUELLE/.test(_nd)){f={...f,nu_mue:true};autoClean.push("nu_mue","nu_esp");}
          else if(/D-\d|PLANCHA|HR\s|LATEX/.test(_nd)){f={...f,nu_esp:true};autoClean.push("nu_mue","nu_esp");}
        }
        const toRemove=new Set([...OBSOLETE_FIELDS,...autoClean]);
        f={...f,_rev:f._rev.filter(r=>!toRemove.has(r))};
      }
      // V56: CONTINUO = MULTIAGUJAS (son la misma máquina). Convertir tA_co→tA_mu, tB_co→tB_mu
      if(f.tA_co){f={...f,tA_mu:true,tA_co:false};}
      if(f.tB_co){f={...f,tB_mu:true,tB_co:false};}
      // V57: Auto-rellenar tipo de núcleo cuando nu_desc tiene D-XX → ESPUMA, o nu_comp tiene BOX/CARCASA → MUELLES
      if(!f.nu_esp&&!f.nu_mue){
        const _allNu=((f.nu_desc||"")+" "+((f.nu_comp||[]).map(c=>typeof c==="string"?c:(c.mat||"")).join(" "))).toUpperCase();
        if(/BOX|CARCASA|ENSACADO|MUELLES|MUELLE/.test(_allNu)){f={...f,nu_mue:true};}
        else if(/D-?\d|PLANCHA|HR\b|LATEX|BOREAL/.test(_allNu)){f={...f,nu_esp:true};}
      }
      // V57: Normalizar nu_desc (limpiar "NUCLEO D21 * 17" → "D-21")
      if(f.nu_desc){
        const _ndm=(f.nu_desc||"").match(/^(?:NUCLEO\s+)?D[-\/]?(\d+)(?:\s*[\*xX]\s*(\d+))?/i);
        if(_ndm){
          f={...f,nu_desc:"D-"+_ndm[1]};
          if(_ndm[2]&&!f.nu_alt) f={...f,nu_alt:_ndm[2]};
        }
      }
      // V11: Split nu_desc "XX CM D-YY" → nu_desc="D-YY", nu_alt="XX"
      if(f.nu_desc && !f.nu_alt){
        const m=(f.nu_desc||"").match(/^(\d+)\s*CM\s+(D-?\d+.*)$/i);
        if(m){f={...f,nu_desc:m[2].trim(),nu_alt:m[1]};}
      }
      // Ensure nu_alt field exists
      if(f.nu_alt===undefined) f={...f,nu_alt:""};
      // V64: Añadir campo 'activo' (true por defecto) a todas las fichas que no lo tengan
      if(f.activo===undefined) f={...f,activo:true};
      // V59: Limpieza genérica de _rev — si un campo ya tiene valor, no necesita revisión
      if(f._rev&&f._rev.length>0){
        const genericClean=f._rev.filter(field=>{
          const val=f[field];
          if(val===undefined||val===null||val===""||val===false)return true; // still empty → keep in _rev
          if(Array.isArray(val)&&val.length===0)return true; // empty array → keep
          return false; // has data → remove from _rev
        });
        if(genericClean.length!==f._rev.length) f={...f,_rev:genericClean};
      }
      // CRETA: force correct values + recover user edits into base
      if(f.id==="creta_001"){
        const nd=(f.nu_desc||"").replace(/\s+/g,"").toUpperCase();
        if(/19/.test(nd)){f={...f,nu_desc:"D-21",nu_alt:"19"};}
        if(!f.nu_alt||f.nu_alt===""){f={...f,nu_alt:"19"};}
        if(!f.codigo) f={...f,codigo:"C193"};
        if(f.tA_mats&&f.tA_mats[2]==="") f={...f,tA_mats:["VISCOELASTICA 1 cm","FIBRA 200","ESPUMA CONVENCIONAL 2cm","TNT 30"]};
        f={...f,nu_esp:true};
      }
      // COL20: "FIBRA" sin gramaje → vacío (regla: solo FIBRA 100/200/300 son válidos)
      if(f.id==="col20_001"){
        if(f.tA_mats){f={...f,tA_mats:f.tA_mats.map(v=>v==="FIBRA"?"":v)};}
        if(f.pl_mats){f={...f,pl_mats:f.pl_mats.map(v=>v==="FIBRA"?"":v)};}
      }
      // AGATA: force correct values
      if(f.id==="agata_001"){
        const nd=(f.nu_desc||"").replace(/\s+/g,"").toUpperCase();
        if(/22/.test(nd)){f={...f,nu_desc:"D-21",nu_alt:"22"};}
        if(!f.nu_alt||f.nu_alt===""){f={...f,nu_alt:"22"};}
        f={...f,nu_esp:true};
      }
      // V30: Regla nucleo multi-material: nu_desc vacio, todo en nu_comp orden PDF, BOX DURO linea aparte
      if(f.id==="titan_001"){
        f={...f,nu_desc:"",nu_alt:"",nu_comp:["VISCOELASTICA 4 cm","D-23 2 cm","ENSACADO 16","D-23 2 cm","BOX DURO"],nu_sop:""};
      }
      // V28+V30: VESKA — tejido KAB 300, regla nucleo multi-material
      if(f.id==="veska_001"){
        if(f.tA_tej==="VFEEL") f={...f,tA_tej:"KAB 300"};
        if(f.tB_tej==="VFEEL") f={...f,tB_tej:"KAB 300"};
        if(f.nu_desc==="D-28"||f.nu_alt==="16") f={...f,nu_desc:"",nu_alt:"",nu_comp:["VISCOELASTICA 2 cm","D-28 16 cm","VISCOELASTICA 2 cm"]};
      }
      // V26: SKY — forzar núcleo D-21 / 13 cm (confirmado por usuario)
      if(f.id==="sky_001"){
        if(!f.nu_desc||f.nu_desc==="") f={...f,nu_desc:"D-21"};
        if(!f.nu_alt||f.nu_alt===""||f.nu_alt==="19") f={...f,nu_alt:"13"};
        // Quitar nu_desc y nu_alt de _rev si estaban
        if(f._rev&&Array.isArray(f._rev)){
          f={...f,_rev:f._rev.filter(r=>r!=="nu_desc"&&r!=="nu_alt")};
        }
      }
      // V33: AGATA — corregir tA_mats (FIBRA 200 + CONVENCIONAL + TNT30) y tB_tej (3D GRIS)
      if(f.id==="agata_001"){
        if(!f.tA_mats||f.tA_mats.length<4||f.tA_mats[1]==="") f={...f,tA_mats:["VISCOELASTICA 2 cm","FIBRA 200","ESPUMA CONVENCIONAL 2cm","TNT 30"]};
        if(!f.tB_tej||f.tB_tej==="") f={...f,tB_tej:"3D GRIS"};
        if(f._rev&&Array.isArray(f._rev)) f={...f,_rev:f._rev.filter(r=>r!=="tA_mats"&&r!=="tB_tej")};
      }
      // V34: AFRODITA — nucleo D-21/21 + pl_comp fracciones
      if(f.id==="afrodita_001"){
        if(!f.nu_desc||f.nu_desc==="") f={...f,nu_desc:"D-21",nu_alt:"21",nu_esp:true};
        if(f._rev&&Array.isArray(f._rev)) f={...f,_rev:f._rev.filter(r=>r!=="nu_desc"&&r!=="nu_alt"&&r!=="nu_comp")};
      }
      // V36: TITAN — pl_tej/pl_comp como arrays (fracciones separadas)
      if(f.id==="titan_001"){
        if(f.pl_tej&&!Array.isArray(f.pl_tej)) f={...f,pl_tej:["KERRY PARDO","VIVO 3mm CHOCO","KERRY BEIGE"],pl_comp:["1/3","VIVO","2/3"]};
        if(f.pl_dib&&Array.isArray(f.pl_dib)&&f.pl_dib[0]==="1/3 LISO") f={...f,pl_dib:["LISO","VIVO","CAPITONE"]};
      }
      // V36: AFRODITA — pl_tej/pl_comp como arrays
      if(f.id==="afrodita_001"){
        if(f.pl_tej&&!Array.isArray(f.pl_tej)) f={...f,pl_tej:["3D BEIG","3D BLANCO"],pl_comp:["1/3","2/3"]};
      }
      // V38: REGLA — solo UN checkbox por tapa (mutuamente excluyentes). Si MASTERTRON, quitar TAPA TAPA.
      if(f.tA_ma===true) f={...f,tA_tt:false,tA_co:false,tA_mu:false};
      if(f.tB_ma===true) f={...f,tB_tt:false,tB_co:false,tB_mu:false};
      // V42: REGLA 1 — BOX en núcleo → nu_mue:true, nu_esp:false
      if(f.nu_comp&&Array.isArray(f.nu_comp)){
        const hasBox=f.nu_comp.some(c=>{const s=typeof c==="string"?c:(c.mat||"");return/BOX/i.test(s);});
        if(hasBox){f={...f,nu_mue:true,nu_esp:false};}
      }
      // V46: REGLA PLATABANDA — CONTINUO siempre gana (MULTIAGUJAS). Si no CONTINUO: FIBRA→ULTRA, sin FIBRA→MULTI. Solo 1 opción.
      {const hasCo=f.tA_co===true||f.tB_co===true;
      const hasFibra=(f.pl_mats||[]).some(m=>/^FIBRA/i.test(m||""));
      const hasMats=(f.pl_mats||[]).length>0&&(f.pl_mats||[]).some(m=>m);
      if(hasCo){f={...f,pl_multi:true,pl_ultra:false};}
      else if(hasFibra){f={...f,pl_ultra:true,pl_multi:false};}
      else if(hasMats){f={...f,pl_multi:true,pl_ultra:false};}
      }
      // V42: Inicializar campos asas platabanda si no existen
      if(f.pl_asas_n===undefined) f={...f,pl_asas_n:""};
      if(f.pl_asas_bord===undefined) f={...f,pl_asas_bord:false};
      if(f.pl_asas_seri===undefined) f={...f,pl_asas_seri:false};
      // V43: Inicializar/limpiar arrays de alturas editables
      if(!f.tA_alts||!Array.isArray(f.tA_alts)) f={...f,tA_alts:[]};
      if(!f.tB_alts||!Array.isArray(f.tB_alts)) f={...f,tB_alts:[]};
      // Limpiar alts que solo tienen strings vacíos (resetear a auto)
      if(f.tA_alts.length>0&&f.tA_alts.every(a=>!a||a==="")) f={...f,tA_alts:[]};
      if(f.tB_alts.length>0&&f.tB_alts.every(a=>!a||a==="")) f={...f,tB_alts:[]};
      // V20+V30: HELEN — correcciones + regla nucleo multi-material
      if(f.id==="helen_001"){
        // Regla nucleo multi-material: nu_desc vacio, todo en nu_comp orden PDF
        if(f.nu_desc==="D-28 SALMON"||f.nu_desc==="D-28") f={...f,nu_desc:"",nu_alt:"",nu_comp:["D-28 SALMON 21 cm","VISCOELASTICA 2 cm"]};
        if(!Array.isArray(f.pl_dib)) f={...f,pl_dib:["LISO","VIVO","RECTANGULOS 398"]};
        if(f.pl_mats&&f.pl_mats[0]!=="VIVO GRIS OSCURO") f={...f,pl_mats:["VIVO GRIS OSCURO","TNT 15"]};
        if(f.pl_comp) f={...f,pl_comp:""};
        f={...f,enr:false,
          obs:"Tejido TapaA: CONTINENTAL (SOREN). Bordado bandera: TELA BOWIE, BORDADO BLANCO AMARILLO VERDE Y ROJO.",
          _rev:["codigo","nu_mue","caja"]
        };
      }
      // V46: Migrar campos CERRADO — rib/frib/gar/peg de string a boolean, nuevos campos color
      if(typeof f.rib==="string"&&f.rib){f={...f,rib:true,rib_col:f.rib};}
      if(typeof f.rib==="string"&&!f.rib){f={...f,rib:false,rib_col:""};}
      if(typeof f.frib==="string"&&f.frib){f={...f,frib:true,frib_col:f.frib};}
      if(typeof f.frib==="string"&&!f.frib){f={...f,frib:false,frib_col:""};}
      if(typeof f.fcrem==="string"&&f.fcrem){f={...f,fcrem:true,fcrem_col:f.fcrem};}
      if(typeof f.fcrem==="string"&&!f.fcrem){f={...f,fcrem:false,fcrem_col:""};}
      if(typeof f.gar==="string"){f={...f,gar:!!f.gar};}
      if(typeof f.peg==="string"){f={...f,peg:!!f.peg};}
      if(f.abierto===undefined) f={...f,abierto:false};
      if(f.frib_col===undefined) f={...f,frib_col:""};
      if(f.fcrem_col===undefined) f={...f,fcrem_col:""};
      // V47: Nuevos campos platabanda, asas, bandera
      if(f.pl_bord===undefined) f={...f,pl_bord:""};
      if(f.pl_seri===undefined) f={...f,pl_seri:""};
      if(f.pl_ubic===undefined) f={...f,pl_ubic:""};
      if(f.as_vivo===undefined) f={...f,as_vivo:false};
      if(f.as_tej===undefined) f={...f,as_tej:""};
      if(f.ban_seri===undefined) f={...f,ban_seri:""};
      if(f.ban_bord===undefined) f={...f,ban_bord:""};
      if(f.ban_vivo===undefined) f={...f,ban_vivo:false};
      if(f.ban_rib===undefined) f={...f,ban_rib:false};
      if(f.ban_tej===undefined) f={...f,ban_tej:""};
      // Migrar as_bordP y as_det a bandera si existen
      if(f.as_bordP&&!f.ban_bord){f={...f,ban_bord:f.as_bordP};}
      // V50: tB_igual — auto-detectar si Tapa B es idéntica a Tapa A
      if(f.tB_igual===undefined){
        const eq=f.tA_tej&&f.tB_tej===f.tA_tej&&f.tB_dib===f.tA_dib&&JSON.stringify(f.tB_mats)===JSON.stringify(f.tA_mats)&&f.tB_tt===f.tA_tt&&f.tB_co===f.tA_co&&f.tB_mu===f.tA_mu&&f.tB_ma===f.tA_ma;
        f={...f,tB_igual:!!eq};
      }
      // V51: REGLA TNT — solo TNT 15 y TNT 30 permitidos, eliminar otras variantes
      const fixTNT=arr=>arr?arr.map(v=>/^TNT/i.test(v)&&v!=="TNT 15"&&v!=="TNT 30"?"":v):arr;
      f={...f,tA_mats:fixTNT(f.tA_mats),tB_mats:fixTNT(f.tB_mats),pl_mats:fixTNT(f.pl_mats)};
      // V51: REGLA ESPUMA CONVENCIONAL — en tapas siempre "ESPUMA CONVENCIONAL 2cm", en platabanda siempre "ESPUMA CONVENCIONAL 1 cm"
      const fixEC_tapa=arr=>arr?arr.map(v=>/^ESPUMA CONVENCIONAL$/i.test(v)||/^ESPUMA CONVENCIONAL 1/i.test(v)?"ESPUMA CONVENCIONAL 2cm":v):arr;
      const fixEC_plat=arr=>arr?arr.map(v=>/^ESPUMA CONVENCIONAL$/i.test(v)||/^ESPUMA CONVENCIONAL 2cm/i.test(v)?"ESPUMA CONVENCIONAL 1 cm":v):arr;
      f={...f,tA_mats:fixEC_tapa(f.tA_mats),tB_mats:fixEC_tapa(f.tB_mats),pl_mats:fixEC_plat(f.pl_mats)};
      // V51: REGLA TNT15→MULTIAGUJAS, TNT30→TAPA TAPA o MASTERTRON (respetar lo que ya tenga)
      if(f.tA_mats&&f.tA_mats.some(v=>v==="TNT 15")){if(!f.tA_mu&&!f.tA_ma)f={...f,tA_mu:true};}
      if(f.tB_mats&&f.tB_mats.some(v=>v==="TNT 15")){if(!f.tB_mu&&!f.tB_ma)f={...f,tB_mu:true};}
      return f;
    });
  }
  // --- OPCIONES ---
  let opts;
  const storedOpts=lsLoad(LS_OPTS,null);
  if(!storedOpts){
    // Primera vez: usar catálogo base D0
    opts={};
    for(const k of Object.keys(D0)){opts[k]=[...D0[k]];}
  } else {
    // Siempre usar lo guardado como base (respeta renames/deletes del usuario)
    opts={};
    for(const k of Object.keys(storedOpts)){opts[k]=[...storedOpts[k]];}
    // En versión nueva: añadir items NUEVOS de D0 que no existan aún
    // PERO respetar items que el usuario eliminó manualmente
    const deletedOpts=lsLoad(LS_DELETED,{});
    if(isNew){
      for(const k of Object.keys(D0)){
        const del=new Set(deletedOpts[k]||[]);
        if(!opts[k]){opts[k]=D0[k].filter(v=>!del.has(v));}
        else{const s=new Set(opts[k]);for(const v of D0[k])if(!s.has(v)&&!del.has(v))opts[k].push(v);}
      }
    } else {
      // Sin versión nueva: asegurar que las categorías de D0 existan
      for(const k of Object.keys(D0)){if(!opts[k])opts[k]=[...D0[k]];}
    }
  }
  // V43: Limpiar objetos {mat,alt} que se hayan colado en catálogos (solo strings permitidos)
  for(const k of Object.keys(opts)){opts[k]=opts[k].filter(v=>typeof v==="string"&&v);}
  // V19: Eliminar "FIBRA" sin gramaje del catálogo de materiales (solo FIBRA 100/200/300 son válidos)
  if(opts.mt) opts.mt=opts.mt.filter(v=>v!=="FIBRA");
  // V38: Eliminar "ESPUMA CONVENCIONAL x1" del catálogo y reemplazar por "ESPUMA CONVENCIONAL 1 cm" en fichas
  if(opts.mt) opts.mt=opts.mt.filter(v=>v!=="ESPUMA CONVENCIONAL x1");
  // V51: Limpiar catálogo — solo TNT 15 y TNT 30
  if(opts.mt) opts.mt=opts.mt.filter(v=>!(/^TNT/i.test(v)&&v!=="TNT 15"&&v!=="TNT 30"));
  // V51: Eliminar "ESPUMA CONVENCIONAL" sola del catálogo (solo permitir con número)
  if(opts.mt) opts.mt=opts.mt.filter(v=>v!=="ESPUMA CONVENCIONAL");
  const _replX1=arr=>arr?arr.map(v=>v==="ESPUMA CONVENCIONAL x1"?"ESPUMA CONVENCIONAL 1 cm":v):arr;
  fichas=fichas.map(f=>{
    let changed=false;
    const tA=_replX1(f.tA_mats);if(tA!==f.tA_mats){f={...f,tA_mats:tA};changed=true;}
    const tB=_replX1(f.tB_mats);if(tB!==f.tB_mats){f={...f,tB_mats:tB};changed=true;}
    const pl=_replX1(f.pl_mats);if(pl!==f.pl_mats){f={...f,pl_mats:pl};changed=true;}
    return f;
  });
  // Guardar versión actual
  if(isNew) lsSave(LS_VER,DATA_VERSION);
  return{fichas,opts};
}
const _init=initData();

/* ========== APP ========== */
function App(){
  const [page,setPage]=useState("home");

  const u=k=>v=>setF(p=>{

    return{...p,[k]:v,_rev:nr,_src:ns};
  });
  // For array fields (mats), remove _rev and _src when any item changes
  const uArr=(k,arr)=>setF(p=>{
    const nr=(p._rev||[]).filter(r=>r!==k);
    const ns={...(p._src||{})};delete ns[k];
    return{...p,[k]:arr,_rev:nr,_src:ns};

  const validate=k=>{

      if(s.id!==editId)return s;
      const nr=(s._rev||[]).filter(r=>r!==k);
      const ns={...(s._src||{})};delete ns[k];
      return{...s,_rev:nr,_src:ns,_userEdited:true,_saved:new Date().toISOString()};
    }));}
  };
  // Validar TODOS los campos en _rev de golpe — quita todas las etiquetas
  const validateAll=()=>setF(p=>{
    const ns={...(p._src||{})};
    for(const k of (p._rev||[])) delete ns[k];
    return{...p,_rev:[],_src:ns};
  });
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(""),2500);};

    else if(detected==="ESPUMA"&&!f.nu_esp&&!f.nu_mue){setF(p=>({...p,nu_esp:true,nu_mue:false}));}

  useEffect(()=>{if(editModal)setTimeout(()=>{const el=document.getElementById("edit-inp");if(el){el.focus();el.select();}},80);},[editModal]);

  // === FICHA ACTIONS ===
  // Catalog blacklist: values that should never be re-added to catalog even if found in fichas
  const CATALOG_BLACKLIST=["ESPUMA CONVENCIONAL","ESPUMA CONVENCIONAL x1","FIBRA","TNT"];
  // === MEJORA 5: Validación blacklist en tiempo real ===
  const MAT_BLACKLIST=["ESPUMA CONVENCIONAL","ESPUMA CONVENCIONAL x1","FIBRA","TNT"];
  const isBlacklisted=v=>MAT_BLACKLIST.includes((v||"").trim());
  // === MEJORA 4: Autocompletado inteligente del núcleo ===
  const autoDetectNucleoType=(nuComp,nuDesc)=>{
    const all=[...(nuComp||[]).map(c=>typeof c==="string"?c:(c.mat||"")),(nuDesc||"")].join(" ").toUpperCase();
    if(/BOX|CARCASA|ENSACADO|MUELLES|MUELLE/.test(all))return"MUELLES";

      (ficha.pl_mats||[]).forEach(v=>ensure("mt",v));

      });

  // === OPTION ACTIONS ===
  const addOpt=(cat,val)=>{

    if(v&&!opts[cat]?.includes(v)){setOpts(p=>({...p,[cat]:[...p[cat],v]}));showToast("Agregado: "+v);}

  const renameOpt=(cat,oldV,newV)=>{
    const nv=newV.trim();

    if(nv.includes("+")){showToast("Error: el valor no puede contener '+'");return;}
    // 1. Renombrar en catálogo
    setOpts(p=>({...p,[cat]:p[cat].map(v=>v===oldV?nv:v)}));
    // 2. Cascadear a la ficha actual en edición
    const arrFields=["tA_mats","tB_mats","pl_mats","pl_dib"];
    const strFields={m:"modelo",c:"cliente",t:["tA_tej","tB_tej","pl_tej"],d:["tA_dib","tB_dib","pl_dib"],
      r:"rib",ch:["pl_hilo","crem_col"],sp:"nu_sop",mt:arrFields};
    setF(p=>{
      const up={...p};
      const fields=strFields[cat];
      if(!fields)return up;
      const flist=Array.isArray(fields)?fields:[fields];
      for(const fk of flist){
        if(Array.isArray(up[fk])){up[fk]=up[fk].map(v=>v===oldV?nv:v);}

      const estado=(f._rev&&f._rev.length>0)?"REVISIÓN":"COMPLETA";

  const matList=(items,setItems,catKey,label,addLabel,alts,setAlts)=>{
    const swap=(a,b)=>{const n=[...items];[n[a],n[b]]=[n[b],n[a]];setItems(n);if(alts&&setAlts){const na=[...(alts||[])];[na[a],na[b]]=[na[b],na[a]];setAlts(na);}};
    return(
    <div style={{marginBottom:6}}>

        <span style={{fontSize:12,fontWeight:700,color:"#1F3864"}}>{label}</span>
        {alts&&<span style={{fontSize:9,color:"#888"}}>ALTURA (cm)</span>}
      </div>
      {items.map((it,i)=>{
        const autoH=exH(it);
        const manH=alts&&alts[i]!==undefined&&alts[i]!==""?alts[i]:null;
        const dispH=manH!==null?manH:autoH;
        return <div key={i} style={{display:"flex",gap:4,marginBottom:4,alignItems:"center"}}>
        <span style={{fontSize:12,color:"#666",minWidth:20,textAlign:"right"}}>{i+1}.</span>
        {sdd(it,v=>{const n=[...items];n[i]=v;setItems(n);if(alts&&setAlts){const na=[...(alts||[])];if(!na[i])na[i]="";setAlts(na);}},catKey,"Buscar...")}
        {alts!==undefined&&<input className="field-inp" style={{width:50,textAlign:"center",fontSize:12,fontWeight:700,padding:"4px 2px",background:manH!==null?"#E3EDFA":(autoH?"#F0F4F8":"#f9f9f9"),color:dispH?"#1F3864":"#ccc",border:"1.5px solid "+(manH!==null?"#2F5496":(autoH?"#8DB4E2":"#ddd"))}} value={dispH||""} placeholder="—" title={manH!==null?"Editado manualmente":"Auto: "+autoH} onChange={e=>{if(setAlts){const na=[...(alts||[])];while(na.length<=i)na.push("");na[i]=e.target.value;setAlts(na);}}}/>}
        {admin&&<div style={{display:"flex",flexDirection:"column",gap:1}}>
          <button className="btn btn-sm" style={{background:"#B4C6E7",color:"#1F3864",padding:"1px 6px",fontSize:10,lineHeight:1}} disabled={i===0} onClick={()=>swap(i,i-1)} title="Subir">&uarr;</button>

        </div>}
        {admin&&<button className="btn btn-sm btn-red" onClick={()=>{setItems(items.filter((_,j)=>j!==i));if(alts&&setAlts){const na=[...(alts||[])];na.splice(i,1);setAlts(na);}}}>&times;</button>}
      </div>;})}

          <button className="btn btn-sm btn-gray" onClick={()=>{const all=new Set(filteredSaved.map(s=>s.id));setBatchSelect(all);}} style={{fontSize:10}}>Selec. todas</button>

          const hasRev=s._rev&&s._rev.length>0;

            {admin&&<input type="checkbox" checked={batchSelect.has(s.id)} onClick={e=>e.stopPropagation()} onChange={e=>{
              const ns=new Set(batchSelect);if(e.target.checked)ns.add(s.id);else ns.delete(s.id);setBatchSelect(ns);

              <div className="modelo">{s.modelo||"(Sin modelo)"}{hasRev&&<span style={{background:"#FFCDD2",color:"#B71C1C",fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:3,marginLeft:6,border:"1px solid #E53935"}}>REV</span>}{s.activo===false&&<span style={{background:"#FFEBEE",color:"#B71C1C",fontSize:8,fontWeight:800,padding:"0 4px",borderRadius:3,marginLeft:4,border:"1px solid #E57373"}}>INACTIVA</span>}</div>
              <div className="cliente">{s.cliente||""}</div>
              <div className="fecha">{s._saved?new Date(s._saved).toLocaleDateString("es-ES"):""}</div>
            </div>
            <div style={{display:"flex",gap:4,flexShrink:0}} onClick={e=>e.stopPropagation()}>
              <button className="btn btn-sm btn-blue" onClick={()=>viewFicha(s)}>PDF</button>
              {admin&&<button className="btn btn-sm btn-red" onClick={()=>setDelModal({type:"ficha",id:s.id,val:s.modelo||"ficha"})}>&times;</button>}

    {/* ===== MODALS ===== */}
    {pwModal&&<div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget){setPwModal(false);setPw("");setPwErr(false);}}}>

      </div>
    </div>}

    {editModal&&<div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setEditModal(null);}}>

            if(e.key==="Enter"){if(editModal.isNew)addOpt(editModal.cat,editVal);else renameOpt(editModal.cat,editModal.oldVal,editVal);setEditModal(null);}

        </div>
      </div>
    </div>}

    {delModal&&<div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget)setDelModal(null);}}>

          <button className="btn btn-md btn-green" onClick={()=>{saveFicha();const act=unsavedModal.action;setUnsavedModal(null);setTimeout(act,50);}}>Guardar y continuar</button>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {Object.entries(CAT_NAMES).map(([k,name])=>(
            <div key={k} className="cat-section">

                <button className="btn btn-sm btn-green" onClick={()=>{setEditVal("");setEditModal({cat:k,oldVal:"",isNew:true});}}>+ Agregar</button>

                {(opts[k]||[]).map(v=>(
                  <div key={v} className="cat-item">

                      <button className="btn btn-sm btn-blue" onClick={()=>{setEditVal(v);setEditModal({cat:k,oldVal:v,isNew:false});}}>&#9998;</button>

                  </div>
                ))}
              </div>
            </div>
          ))}

      {page==="edit"&&admin&&(()=>{

          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {_rv.length>0&&<button className="btn btn-md" style={{background:"#FFCDD2",color:"#B71C1C",border:"1.5px solid #E53935",fontWeight:700,fontSize:11}} onClick={()=>{const clean={_rev:[]};setF(p=>({...p,...clean}));if(editId){setSaved(prev=>prev.map(s=>s.id===editId?{...s,...clean,_userEdited:true,_saved:new Date().toISOString()}:s));}showToast("Revisiones limpiadas");}}>Revisión ({_rv.length})</button>}
            {Object.keys(_src).length>0&&<button className="btn btn-md" style={{background:"#E8F5E9",color:"#2E7D32",border:"1.5px solid #66BB6A",fontWeight:600,fontSize:11}} onClick={()=>{const clean={_src:{}};setF(p=>({...p,...clean}));if(editId){setSaved(prev=>prev.map(s=>s.id===editId?{...s,...clean,_userEdited:true,_saved:new Date().toISOString()}:s));}showToast("Etiquetas PDF limpiadas");}}>PDF ({Object.keys(_src).length})</button>}

            <button className="btn btn-md" style={{background:f.activo===false?"#FFCDD2":"#C8E6C9",color:f.activo===false?"#B71C1C":"#2E7D32",border:f.activo===false?"1.5px solid #E53935":"1.5px solid #4CAF50",fontWeight:700,fontSize:11,cursor:"pointer"}} onClick={()=>{setF(p=>({...p,activo:p.activo===false?true:false}));setDirty(true);}}>{f.activo===false?"INACTIVA":"ACTIVA"}</button>
            <button className="btn btn-md btn-gray" onClick={()=>safNav(()=>setPage("home"))}>Cerrar</button>
          </div>
        </div>
        <div style={{background:"#F8F9FC",padding:16,border:"1.5px solid #8DB4E2",borderTop:"none",borderRadius:"0 0 8px 8px"}}>

            <FInp label="FECHA" value={f.fecha} onChange={u("fecha")} ph="16/03/2026" w={65} {...rv("fecha")}/>

            <FRow label="SOPORTE" w={65} {...rv("nu_sop")}>{sdd(f.nu_sop,u("nu_sop"),"sp","Soporte...")}</FRow>

          </div>
          {/* Composición núcleo con altura editable */}
          {(()=>{
            const items=f.nu_comp||[];
            const setItems=v=>uArr("nu_comp",v);

            <div style={{marginBottom:6}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1F3864",marginBottom:4}}>Composicion Nucleo (en orden)</div>
              {items.map((it,i)=>{
                const obj=typeof it==="string"?{mat:it,alt:""}:it;
                const autoAlt=exH(obj.mat);
                const dispAlt=obj.alt||autoAlt;
                return <div key={i} style={{display:"flex",gap:4,marginBottom:4,alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#666",minWidth:20,textAlign:"right"}}>{i+1}.</span>
                  <div style={{flex:1}}>{sdd(obj.mat,v=>{const n=[...items];n[i]={...obj,mat:v,alt:exH(v)||obj.alt};setItems(n);},"n","Material nucleo...")}</div>
                  <input className="field-inp" style={{width:70,textAlign:"center",background:obj.alt?"#E3EDFA":(autoAlt?"#F0F4F8":"#fff"),fontWeight:dispAlt?700:400}} value={dispAlt} onChange={e=>{const n=[...items];n[i]={...obj,alt:e.target.value};setItems(n);}} placeholder="—"/>

                    <button className="btn btn-sm" style={{background:"#B4C6E7",color:"#1F3864",padding:"1px 6px",fontSize:10,lineHeight:1}} disabled={i===0} onClick={()=>swap(i,i-1)} title="Subir">&uarr;</button>

                  </div>}
                  {admin&&<button className="btn btn-sm btn-red" onClick={()=>setItems(items.filter((_,j)=>j!==i))}>&times;</button>}
                </div>;
              })}
              {admin&&<button className="btn btn-sm btn-blue" onClick={()=>setItems([...items,{mat:"",alt:""}])} style={{marginTop:2}}>+ Agregar componente</button>}
            </div>);
          })()}

          <div className="sec-head">ACOLCHADO - TAPA A</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <FRow label="TEJIDO" w={60} {...rv("tA_tej")}>{sdd(f.tA_tej,u("tA_tej"),"t","Buscar tejido...")}</FRow>
            <FRow label="DIBUJO" w={60} {...rv("tA_dib")}>{sdd(f.tA_dib,u("tA_dib"),"d","Buscar dibujo...")}</FRow>
          </div>
          {matList(f.tA_mats,v=>uArr("tA_mats",v),"mt","Composicion Tapa A (en orden)",null,f.tA_alts||[],v=>setF(p=>({...p,tA_alts:v})))}
          <div className="chk-row"><FChk label="TAPA TAPA" checked={f.tA_tt} onChange={u("tA_tt")}/><FChk label="CONTINUO" checked={f.tA_co} onChange={u("tA_co")}/><FChk label="MULTIAGUJAS" checked={f.tA_mu} onChange={u("tA_mu")}/><FChk label="MASTERTRON" checked={f.tA_ma} onChange={u("tA_ma")}/></div>

          <div className="sec-head">ACOLCHADO - TAPA B</div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",background:f.tB_igual?"#E3EDFA":"#f5f5f5",padding:"6px 14px",borderRadius:6,border:f.tB_igual?"2px solid #2F5496":"1.5px solid #ccc",fontWeight:700,fontSize:13,color:"#1F3864"}}>
              <input type="checkbox" checked={!!f.tB_igual} onChange={e=>{const v=e.target.checked;if(v){setF(p=>({...p,tB_igual:true,tB_tej:p.tA_tej,tB_dib:p.tA_dib,tB_mats:[...p.tA_mats],tB_alts:[...(p.tA_alts||[])],tB_tt:p.tA_tt,tB_co:p.tA_co,tB_mu:p.tA_mu,tB_ma:p.tA_ma}));}else{setF(p=>({...p,tB_igual:false}));}}} style={{width:18,height:18}}/> IGUAL TAPA A
            </label>
          </div>
          {!f.tB_igual&&<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <FRow label="TEJIDO" w={60} {...rv("tB_tej")}>{sdd(f.tB_tej,u("tB_tej"),"t","Buscar tejido...")}</FRow>
            <FRow label="DIBUJO" w={60} {...rv("tB_dib")}>{sdd(f.tB_dib,u("tB_dib"),"d","Buscar dibujo...")}</FRow>
          </div>
          {matList(f.tB_mats,v=>uArr("tB_mats",v),"mt","Composicion Tapa B (en orden)",null,f.tB_alts||[],v=>setF(p=>({...p,tB_alts:v})))}
          <div className="chk-row"><FChk label="TAPA TAPA" checked={f.tB_tt} onChange={u("tB_tt")}/><FChk label="CONTINUO" checked={f.tB_co} onChange={u("tB_co")}/><FChk label="MULTIAGUJAS" checked={f.tB_mu} onChange={u("tB_mu")}/><FChk label="MASTERTRON" checked={f.tB_ma} onChange={u("tB_ma")}/></div></>}

          <div className="sec-head">PLATABANDA</div>
          {Array.isArray(f.pl_tej)?<>{f.pl_tej.map((t,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"3fr 1fr",gap:4,marginBottom:2}}>
            <FRow label={i===0?"TEJIDO":""} w={60}>{sdd(t,v=>{const a=[...f.pl_tej];a[i]=v;u("pl_tej")(a);},"t","Tejido...")}</FRow>
            <FRow label={i===0?"FRAC.":""} w={40}><input className="inp" value={(Array.isArray(f.pl_comp)?f.pl_comp[i]:"")||""} onChange={e=>{const a=Array.isArray(f.pl_comp)?[...f.pl_comp]:[];a[i]=e.target.value;u("pl_comp")(a);}} placeholder="1/3" style={{width:"100%"}}/></FRow>
          </div>)}
            {admin&&<div style={{display:"flex",gap:4,marginBottom:4}}><button className="btn btn-sm btn-blue" style={{fontSize:10}} onClick={()=>{u("pl_tej")([...f.pl_tej,""]);const c=Array.isArray(f.pl_comp)?[...f.pl_comp]:[];c.push("");u("pl_comp")(c);}}>+ Tejido</button><button className="btn btn-sm" style={{fontSize:10,background:"#eee"}} onClick={()=>{if(f.pl_tej.length>1){const t=[...f.pl_tej];t.pop();u("pl_tej")(t);const c=Array.isArray(f.pl_comp)?[...f.pl_comp]:[];c.pop();u("pl_comp")(c);}}}>- Quitar</button></div>}
          </>:<><FRow label="TEJIDO" w={60}>{sdd(f.pl_tej||"",u("pl_tej"),"t","Tejido platabanda...")}</FRow>
            {admin&&<button className="btn btn-sm btn-blue" style={{marginBottom:4,fontSize:10}} onClick={()=>{u("pl_tej")(f.pl_tej?[f.pl_tej,""]:[""]);u("pl_comp")(["",""]);}}>+ Multi-tejido (fracciones)</button>}</>}
          {Array.isArray(f.pl_dib)?matList(f.pl_dib,v=>uArr("pl_dib",v),"d","Dibujos Platabanda (en orden)","Agregar dibujo"):<><FRow label="DIBUJO" w={60}>{sdd(f.pl_dib||"",v=>{u("pl_dib")(v);},"d","Dibujo...")}</FRow>{admin&&<button className="btn btn-sm btn-blue" style={{marginBottom:4,fontSize:10}} onClick={()=>{const cur=f.pl_dib?[f.pl_dib]:[];uArr("pl_dib",[...cur,""]);}}>+ Multi-dibujo</button>}</>}
          {matList(f.pl_mats||[],v=>uArr("pl_mats",v),"mt","Composicion Platabanda (en orden)")}
          <FInp label="COMP. TEXTO" value={f.pl_comp} onChange={u("pl_comp")} ph="1/3 LONETA + 2/3 MICRO (texto libre)" w={85}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <FRow label="HILO" w={40}>{sdd(f.pl_hilo,u("pl_hilo"),"ch","Color...")}</FRow>
          </div>
          <div className="chk-row"><FChk label="ULTRASONICO" checked={f.pl_ultra} onChange={v=>setF(p=>({...p,pl_ultra:v,pl_multi:v?false:p.pl_multi}))}/><FChk label="MULTIAGUJAS" checked={f.pl_multi} onChange={v=>setF(p=>({...p,pl_multi:v,pl_ultra:v?false:p.pl_ultra}))}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            <FInp label="BORDADO" value={f.pl_bord||""} onChange={u("pl_bord")} ph="Bordado platabanda" w={65}/>
            <FInp label="SERIGRAFÍA" value={f.pl_seri||""} onChange={u("pl_seri")} ph="Serigrafía" w={70}/>
            <FInp label="UBICACIÓN" value={f.pl_ubic||""} onChange={u("pl_ubic")} ph="Ubicación" w={70}/>
          </div>
          <div className="sec-light" style={{marginTop:6}}>ASAS (dentro de platabanda)</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            <FInp label="Nº ASAS" value={f.pl_asas_n||""} onChange={u("pl_asas_n")} ph="4" w={60}/>
            <FChk label="BORDADA" checked={f.pl_asas_bord||false} onChange={u("pl_asas_bord")}/>
            <FChk label="SERIGRAFIADA" checked={f.pl_asas_seri||false} onChange={u("pl_asas_seri")}/>
          </div>

          <div className="sec-head">COMPOSICIÓN ASAS</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            <FInp label="BORDADO" value={f.as_bord} onChange={u("as_bord")} ph="2 BORDADA KORFLEX" w={65}/>
            <FRow label="Nº ASAS" w={55}>{sdd(f.as_n,u("as_n"),"a","Nº asas...")}</FRow>
            <FInp label="ETIQ.COS." value={f.as_etiq} onChange={u("as_etiq")} ph="BANDERA" w={65}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:6}}>
            <FInp label="SERIGRAFÍA" value={f.as_seri} onChange={u("as_seri")} ph="Serigrafía asas" w={70}/>
            <FChk label="VIVO" checked={!!f.as_vivo} onChange={u("as_vivo")}/>
            <FRow label="TEJIDO" w={50}>{sdd(f.as_tej||"",u("as_tej"),"t","Tejido asas...")}</FRow>
          </div>
          <div className="chk-row"><FChk label="HORIZ" checked={f.as_horiz} onChange={u("as_horiz")}/><FChk label="VERT" checked={f.as_vert} onChange={u("as_vert")}/></div>

          <div className="sec-head">BANDERA</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <FInp label="SERIGRAFÍA" value={f.ban_seri||""} onChange={u("ban_seri")} ph="Serigrafía bandera" w={75}/>
            <FInp label="TEJIDO" value={f.ban_tej||""} onChange={u("ban_tej")} ph="Tejido bandera" w={55}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            <FInp label="BORDADO" value={f.ban_bord||""} onChange={u("ban_bord")} ph="Bordado bandera" w={65}/>
            <FChk label="VIVO" checked={!!f.ban_vivo} onChange={u("ban_vivo")}/>
            <FChk label="RIBETE" checked={!!f.ban_rib} onChange={u("ban_rib")}/>
          </div>

          <div className="sec-head">CERRADO</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><FChk label="RIBETE" checked={!!f.rib} onChange={u("rib")}/>{f.rib&&sdd(f.rib_col,u("rib_col"),"r","Color...")}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><FChk label="FUNDA RIBETE" checked={!!f.frib} onChange={u("frib")}/>{f.frib&&sdd(f.frib_col,u("frib_col"),"r","Color...")}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><FChk label="FUN.CREMALLERA" checked={!!f.fcrem} onChange={u("fcrem")}/>{f.fcrem&&sdd(f.fcrem_col,u("fcrem_col"),"ch","Color...")}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><FChk label="CREMALLERA" checked={!!f.crem} onChange={u("crem")}/>{f.crem&&sdd(f.crem_col,u("crem_col"),"ch","Color...")}</div>
          </div>
          <div className="chk-row" style={{gap:10,marginTop:6}}><FChk label="CAJA" checked={!!f.caja} onChange={u("caja")}/><FChk label="ENCARTE" checked={!!f.enc} onChange={u("enc")}/><FChk label="ENROLLADO" checked={!!f.enr} onChange={u("enr")}/><FChk label="ABIERTO" checked={!!f.abierto} onChange={u("abierto")}/></div>

          <div className="sec-light" style={{marginTop:10}}>OBSERVACIONES</div>
          <textarea value={f.obs} onChange={e=>setF(p=>({...p,obs:e.target.value}))}
            style={{width:"100%",height:55,fontSize:13,padding:8,border:"1.5px solid #8DB4E2",borderRadius:5,resize:"vertical"}} placeholder="Observaciones..."/>

          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:16}}>
            <button className="btn btn-lg btn-green" onClick={saveFicha}>{editId?"Actualizar Ficha":"Guardar Nueva Ficha"}</button>
            <button className="btn btn-lg btn-blue" onClick={()=>safNav(()=>setPage("preview"))}>Vista Previa / PDF</button>
          </div>
        </div>
      </div>})()}
      {/* BARRA FLOTANTE REVISIONES PENDIENTES — editor */}
      {page==="edit"&&admin&&f._rev?.length>0&&<div style={{position:"fixed",bottom:0,left:290,right:0,background:"rgba(255,205,210,0.95)",borderTop:"3px solid #E53935",padding:"10px 20px",display:"flex",justifyContent:"center",alignItems:"center",gap:16,zIndex:100}}>
        <span style={{fontSize:13,fontWeight:700,color:"#B71C1C"}}>Campos pendientes de revisar: {f._rev?.length||0}</span>
        <button className="btn btn-lg" style={{background:"#B71C1C",color:"#fff",fontWeight:700,padding:"8px 24px"}} onClick={()=>{const clean={_rev:[],_src:{}};setF(p=>({...p,...clean}));if(editId){setSaved(prev=>prev.map(s=>s.id===editId?{...s,...clean,_userEdited:true,_saved:new Date().toISOString()}:s));}showToast("Revisiones limpiadas");}}>Limpiar revisiones</button>
      </div>}

      {/* PREVIEW */}
      {page==="preview"&&<div style={{maxWidth:920,margin:"0 auto"}}>
        <div style={{display:"flex",gap:12,justifyContent:"center",padding:10,marginBottom:8}}>
          {admin&&<button className="btn btn-lg btn-gray" onClick={()=>setPage("edit")}>Volver a Editar</button>}
          {!admin&&<button className="btn btn-lg btn-gray" onClick={()=>setPage("home")}>Volver</button>}
          <button className="btn btn-lg btn-blue" onClick={doprint}>Descargar PDF</button>
          {f._rev?.length>0&&<button className="btn btn-lg" style={{background:"#FFCDD2",color:"#B71C1C",border:"2px solid #E53935",fontWeight:700}} onClick={()=>{const clean={_rev:[]};setF(p=>({...p,...clean}));if(editId){setSaved(prev=>prev.map(s=>s.id===editId?{...s,...clean,_userEdited:true,_saved:new Date().toISOString()}:s));}showToast("Revisiones limpiadas");}}>Revisión ({f._rev?.length||0})</button>}
        </div>
        <div style={{border:"2px solid #1F3864",borderRadius:6,overflow:"hidden"}}>{previewContent}</div>
        {admin&&f._rev?.length>0&&<div style={{position:"fixed",bottom:0,left:290,right:0,background:"rgba(255,205,210,0.95)",borderTop:"3px solid #E53935",padding:"10px 20px",display:"flex",justifyContent:"center",alignItems:"center",gap:16,zIndex:100}}>
          <span style={{fontSize:13,fontWeight:700,color:"#B71C1C"}}>Campos pendientes de revisar: {f._rev?.length||0}</span>
          <button className="btn btn-lg" style={{background:"#B71C1C",color:"#fff",fontWeight:700,padding:"8px 24px"}} onClick={()=>{const clean={_rev:[],_src:{}};setF(p=>({...p,...clean}));if(editId){setSaved(prev=>prev.map(s=>s.id===editId?{...s,...clean,_userEdited:true,_saved:new Date().toISOString()}:s));}showToast("Revisiones limpiadas");}}>Limpiar revisiones</button>
        </div>}
      </div>}

      {/* Redirect: if not admin tries to access edit, go to preview */}
      {page==="edit"&&!admin&&viewFicha(f)&&null}

    </div>
  </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){if(this.state.error)return React.createElement("div",{style:{padding:40,textAlign:"center"}},
    React.createElement("h2",{style:{color:"#c00"}},"Error en la aplicación"),
    React.createElement("pre",{style:{color:"#666",fontSize:12,whiteSpace:"pre-wrap",margin:"16px auto",maxWidth:600}},String(this.state.error)),
    React.createElement("button",{onClick:()=>this.setState({error:null}),style:{padding:"8px 24px",fontSize:14,cursor:"pointer"}},"Reintentar"));
    return this.props.children;}
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);




</script>
