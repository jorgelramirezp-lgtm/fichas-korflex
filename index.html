*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#E8ECF1;min-height:100vh;}
button{font-family:inherit;}
/* Search dropdown */
.sd-wrap{position:relative;flex:1;min-width:100px;}
.sd-inp{width:100%;font-size:13px;padding:6px 30px 6px 10px;border:1.5px solid #8DB4E2;border-radius:5px;background:#FAFBFF;outline:none;}
.sd-inp:focus{border-color:#2F5496;box-shadow:0 0 0 2px rgba(47,84,150,0.18);}
.sd-inp.filled{background:#E3EDFA;font-weight:600;color:#1F3864;}
.sd-x{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px;color:#999;padding:0;line-height:1;}
.sd-x:hover{color:#c00;}
.sd-list{position:absolute;top:100%;left:0;right:0;max-height:240px;overflow-y:auto;background:#fff;border:1.5px solid #8DB4E2;border-top:none;border-radius:0 0 6px 6px;z-index:200;box-shadow:0 6px 16px rgba(0,0,0,0.15);}
.sd-item{padding:7px 12px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;}
.sd-item:hover,.sd-item.act{background:#D6E4F0;color:#1F3864;}
.sd-item mark{background:#FFE082;color:#1F3864;font-weight:bold;border-radius:2px;padding:0 2px;}
.sd-meta{padding:4px 12px;font-size:10px;color:#888;background:#F8F8F8;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;}
.sd-empty{padding:12px;font-size:12px;color:#999;text-align:center;}
/* Buttons */
.btn{border:none;border-radius:5px;cursor:pointer;font-weight:600;display:inline-flex;align-items:center;gap:4px;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn-sm{padding:4px 10px;font-size:11px;}
.btn-md{padding:6px 14px;font-size:13px;}
.btn-lg{padding:10px 24px;font-size:15px;}
.btn-green{background:#2E7D32;color:#fff;}
.btn-blue{background:#2F5496;color:#fff;}
.btn-dark{background:#1F3864;color:#fff;}
.btn-orange{background:#E8830C;color:#fff;}
.btn-red{background:#c00;color:#fff;}
.btn-gray{background:#666;color:#fff;}

.sidebar{width:290px;background:#fff;border-right:2px solid #1F3864;display:flex;flex-direction:column;height:100vh;position:fixed;left:0;top:0;z-index:50;box-shadow:2px 0 12px rgba(0,0,0,.08);}
.sb-head{background:#1F3864;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.sb-search{padding:10px;border-bottom:1px solid #ddd;}
.sb-search input{width:100%;padding:8px 12px;font-size:13px;border:1.5px solid #8DB4E2;border-radius:5px;outline:none;}
.sb-search input:focus{border-color:#2F5496;}
.sb-list{flex:1;overflow-y:auto;}
.sb-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;gap:10px;transition:background .15s;}
.sb-item:hover{background:#E3EDFA;}
.sb-item.sel{background:#B4C6E7;}
.sb-item .info{flex:1;min-width:0;}
.sb-item .modelo{font-size:13px;font-weight:700;color:#1F3864;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-item .cliente{font-size:11px;color:#666;}
.sb-item .fecha{font-size:9px;color:#aaa;}
.sb-actions{padding:10px;border-top:1px solid #ddd;display:flex;flex-direction:column;gap:5px;}
.main{margin-left:290px;padding:12px 16px;}
/* Sections */
.sec-head{background:#1F3864;color:#fff;padding:6px 12px;font-weight:700;font-size:13px;border-radius:4px;margin:10px 0 6px;}
.sec-light{background:#B4C6E7;padding:5px 12px;font-weight:700;font-size:13px;border-radius:4px;margin-bottom:6px;}
.sec-head-nucleo{background:#E65100;color:#fff;padding:6px 12px;font-weight:700;font-size:13px;border-radius:4px;margin:6px 0 6px;}
.sec-head-tapas{background:#2E7D32;color:#fff;padding:6px 12px;font-weight:700;font-size:13px;border-radius:4px;margin:6px 0 6px;}
.sec-head-plata{background:#512DA8;color:#fff;padding:6px 12px;font-weight:700;font-size:13px;border-radius:4px;margin:6px 0 6px;}
.sec-sub-tapas{background:#C8E6C9;padding:5px 12px;font-weight:700;font-size:12px;border-radius:4px;margin:6px 0 4px;color:#1B5E20;}
.sec-sub-plata{background:#D1C4E9;padding:5px 12px;font-weight:700;font-size:12px;border-radius:4px;margin:6px 0 4px;color:#311B92;}
.zone-nucleo{background:#FFF3E0;border-left:5px solid #E65100;border:2px solid #FFB300;border-radius:8px;padding:10px 14px;margin:10px 0;}
.zone-tapas{background:#E8F5E9;border-left:5px solid #2E7D32;border:2px solid #81C784;border-radius:8px;padding:10px 14px;margin:10px 0;}
.zone-plata{background:#E8E0F0;border-left:5px solid #512DA8;border:2px solid #B39DDB;border-radius:8px;padding:10px 14px;margin:10px 0;}
.field-row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.field-label{font-size:12px;font-weight:700;color:#1F3864;min-width:70px;white-space:nowrap;}
.field-inp{flex:1;font-size:13px;padding:6px 10px;border:1.5px solid #8DB4E2;border-radius:5px;outline:none;min-width:0;}
.field-inp:focus{border-color:#2F5496;}
.chk-row{display:flex;gap:16px;flex-wrap:wrap;margin:4px 0;}
.chk{display:flex;align-items:center;gap:5px;font-size:12px;cursor:pointer;user-select:none;}
.chk input{width:16px;height:16px;margin:0;cursor:pointer;}
/* Catalog admin */
.cat-section{margin-bottom:12px;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
.cat-head{background:#F0F4F8;padding:8px 12px;font-weight:700;font-size:13px;color:#1F3864;display:flex;justify-content:space-between;align-items:center;}
.cat-body{padding:6px 10px;max-height:200px;overflow-y:auto;}
.cat-item{display:flex;align-items:center;justify-content:space-between;padding:4px 6px;border-bottom:1px solid #f0f0f0;font-size:12px;}
.cat-item:last-child{border:none;}
.cat-item:hover{background:#F5F5F5;}
/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1F3864;color:#fff;padding:12px 28px;border-radius:10px;font-size:14px;font-weight:600;z-index:99999;box-shadow:0 4px 20px rgba(0,0,0,.3);}
/* Modal */
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:9999;}
.modal-box{background:#fff;padding:28px;border-radius:12px;min-width:360px;max-width:500px;box-shadow:0 8px 30px rgba(0,0,0,.3);}
@media(max-width:800px){.sidebar{display:none;}.main{margin-left:0;}}

@media print {
  .sec-bar-nucleo, tr td[style*="E65100"], .print-nucleo { background:#E65100 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .sec-bar-tapas, tr td[style*="2E7D32"], .print-tapas { background:#2E7D32 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  .sec-bar-plata, tr td[style*="512DA8"], .print-plata { background:#512DA8 !important; color:#fff !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  table[style*="FFF3E0"], table[style*="E8F5E9"], table[style*="E8E0F0"] { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

.tbl-nucleo td{background-color:#FFF3E0 !important;}
.tbl-nucleo tr:first-child td{background-color:#E65100 !important;color:#fff !important;}
.tbl-tapas td{background-color:#E8F5E9 !important;}
.tbl-tapas tr:first-child td{background-color:#2E7D32 !important;color:#fff !important;}
.tbl-plata td{background-color:#E8E0F0 !important;}
.tbl-plata tr:first-child td{background-color:#7B1FA2 !important;color:#fff !important;}

</style>

/* ========== SEARCH DROPDOWN ========== */
function SearchDd({value,onChange,options,placeholder,showAdminBtns,onAdminAdd,onAdminEdit,onAdminDel}){
  const [open,setOpen]=useState(false);
  const [q,setQ]=useState("");
  const [ai,setAi]=useState(-1);
  const wrap=useRef(),inp=useRef(),list=useRef(),keyNav=useRef(false);

  useEffect(()=>{
    const h=e=>{if(wrap.current&&!wrap.current.contains(e.target)){setOpen(false);setQ("");}};
    document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h);
  },[]);

  const filtered=useMemo(()=>{
    if(!q.trim())return options.map(o=>({t:o,sc:0}));
    return options.map(o=>({t:o,...fuzzy(o,q)})).filter(r=>r.ok).sort((a,b)=>b.sc-a.sc);
  },[options,q]);

  const pick=v=>{onChange(v);setOpen(false);setQ("");setAi(-1);};
  const onKey=e=>{
    if(!open){setOpen(true);return;}
    if(e.key==="ArrowDown"){e.preventDefault();keyNav.current=true;setAi(i=>Math.min(i+1,filtered.length-1));}
    else if(e.key==="ArrowUp"){e.preventDefault();keyNav.current=true;setAi(i=>Math.max(i-1,0));}
    else if(e.key==="Enter"){e.preventDefault();if(ai>=0&&ai<filtered.length)pick(filtered[ai].t);else if(filtered.length===1)pick(filtered[0].t);}
    else if(e.key==="Escape"){setOpen(false);setQ("");}
  };
  useEffect(()=>{if(keyNav.current&&list.current&&ai>=0){const el=list.current.children[ai+1];if(el)el.scrollIntoView({block:"nearest"});}keyNav.current=false;},[ai]);

  return(
    <div className="sd-wrap" ref={wrap}>
      <input ref={inp} className={"sd-inp"+(value&&!open?" filled":"")}
        value={open?q:(value||"")}
        onChange={e=>{setQ(e.target.value);setOpen(true);setAi(-1);}}
        onFocus={()=>{setOpen(true);setQ("");setAi(-1);}}
        onKeyDown={onKey}
        placeholder={placeholder||(value||"Buscar...")} autoComplete="off"/>
      {value&&!open&&<button className="sd-x" onClick={e=>{e.stopPropagation();onChange("");inp.current?.focus();}}>&times;</button>}
      {open&&<div className="sd-list" ref={list}>
        <div className="sd-meta">
          <span>{filtered.length} de {options.length}</span>
          {showAdminBtns&&<button className="btn btn-sm btn-orange" onClick={e=>{e.stopPropagation();setOpen(false);if(onAdminAdd)onAdminAdd(q||"");}}>+ Nuevo</button>}
        </div>
        {filtered.length===0&&<div className="sd-empty">Sin resultados para "{q}"</div>}
        {filtered.map((it,i)=>(
          <div key={it.t} className={"sd-item"+(i===ai?" act":"")} onMouseEnter={()=>{keyNav.current=false;setAi(i);}}>
            <span onClick={()=>pick(it.t)} style={{flex:1,cursor:"pointer"}}>{q?hilite(it.t,q):it.t}</span>
            {showAdminBtns&&<span style={{display:"flex",gap:3,flexShrink:0}}>
              <button className="btn btn-sm btn-blue" onClick={e=>{e.stopPropagation();setOpen(false);if(onAdminEdit)onAdminEdit(it.t);}}>&#9998;</button>
              <button className="btn btn-sm btn-red" onClick={e=>{e.stopPropagation();setOpen(false);if(onAdminDel)onAdminDel(it.t);}}>&times;</button>
            </span>}
          </div>
        ))}
      </div>}
    </div>
  );
}



/* ========== BASIC INPUTS ========== */
function FRow({label,children,w,revField,srcField,onValidate}){
  const hasTag=revField||srcField;
  const isRev=!!revField;

// === CONSTANTES DE ALMACENAMIENTO ===
const LS_FICHAS="korflex_fichas";
const LS_OPTS="korflex_opts";
const LS_VER="korflex_version";
const LS_DELETED="korflex_deleted_opts";
const DATA_VERSION=78;

// === SEGURIDAD: Checksum de integridad para detectar corrupción de datos ===
function _checksum(str){let h=0;for(let i=0;i<str.length;i++){h=((h<<5)-h)+str.charCodeAt(i);h|=0;}return(h>>>0).toString(36);}

function lsLoad(key,fallback){
  try{
    const raw=localStorage.getItem(key);
    if(!raw)return fallback;
    // Verificar si tiene checksum de integridad
    if(raw.startsWith("{")||raw.startsWith("[")||raw.startsWith("\"")||!isNaN(raw)){
      return JSON.parse(raw); // Formato legacy sin checksum
    }
    // Formato con checksum: "checksum|json_data"
    const sep=raw.indexOf("|");
    if(sep>0){
      const storedHash=raw.substring(0,sep);
      const jsonStr=raw.substring(sep+1);
      const calcHash=_checksum(jsonStr);
      if(storedHash!==calcHash){
        console.warn("ALERTA: Datos de "+key+" pueden estar corruptos (checksum no coincide)");
        // Intentar cargar igualmente pero alertar
      }
      return JSON.parse(jsonStr);
    }
    return JSON.parse(raw);
  }catch(e){
    console.warn("Error cargando "+key+":",e.message);
    return fallback;
  }
}
function lsSave(key,val){
  try{
    const data=JSON.stringify(val);
    // Guardar con checksum de integridad
    const hash=_checksum(data);
    localStorage.setItem(key,hash+"|"+data);
    // Check total localStorage usage
    let total=0;try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);total+=localStorage.getItem(k).length;}}catch(e){}
    const maxBytes=5*1024*1024; // 5MB typical limit
    const pct=Math.round((total/maxBytes)*100);
    if(pct>80){
      const warn=document.getElementById("ls-warning");
      if(warn)warn.style.display="flex";
      console.warn("localStorage al "+pct+"% ("+Math.round(total/1024)+"KB de ~5MB)");
    }
  }catch(e){
    alert("ERROR: No se pudo guardar. El almacenamiento está lleno.\n\nExporta tu JSON como backup inmediatamente.");
  }
}
function initData(){
  const storedVer=lsLoad(LS_VER,0);

  let fichas=lsLoad(LS_FICHAS,null);

  if(!fichas){
    // Primera carga: usar snapshot del usuario TAL CUAL (datos ya revisados y limpios)
    if(typeof USER_SNAPSHOT!=="undefined"&&USER_SNAPSHOT.length>0){
      fichas=USER_SNAPSHOT.map(s=>({...s}));

  } else if(isNew){

    // Esto asegura que GitHub siempre muestre los datos correctos
    if(typeof USER_SNAPSHOT!=="undefined"&&USER_SNAPSHOT.length>=fichas.length){
      // Preservar fichas creadas por el usuario (no están en snapshot)
      const snapIds=new Set(USER_SNAPSHOT.map(s=>s.id));
      const userCreated=fichas.filter(f=>!snapIds.has(f.id));

    if(typeof USER_SNAPSHOT!=="undefined")USER_SNAPSHOT.forEach(s=>baseMap[s.id]={...s});
    fichas=fichas.map(f=>{
      const base=baseMap[f.id];
      if(!base) return f; // ficha creada por el usuario, no tocar
      // REGLA FUNDAMENTAL: si el usuario editó esta ficha, NO TOCAR NADA
      if(f._userEdited) return f;

      // y campos que no necesitan revisión si ya están completos

        if((f._rev.includes("nu_esp")||f._rev.includes("nu_mue"))&&f.nu_desc&&!f.nu_mue&&!f.nu_esp){
          const _nd=((f.nu_desc||"")+" "+((f.nu_comp||[]).map(c=>typeof c==="string"?c:(c.mat||"")).join(" "))).toUpperCase();
          if(/BOX|CARCASA|ENSACADO|MUELLES|MUELLE/.test(_nd)){f={...f,nu_mue:true};autoClean.push("nu_mue","nu_esp");}

      if(f.ban_seri===undefined) f={...f,ban_seri:""};
      if(f.ban_bord===undefined) f={...f,ban_bord:""};
      if(f.ban_vivo===undefined) f={...f,ban_vivo:false};
      if(f.ban_rib===undefined) f={...f,ban_rib:false};
      if(f.ban_tej===undefined) f={...f,ban_tej:""};
      // Migrar as_bordP y as_det a bandera si existen
      if(f.as_bordP&&!f.ban_bord){f={...f,ban_bord:f.as_bordP};}
      // V50: tB_igual — auto-detectar si Tapa B es idéntica a Tapa A
      if(f.tB_igual===undefined){
        const eq=f.tA_tej&&f.tB_tej===f.tA_tej&&f.tB_dib===f.tA_dib&&JSON.stringify(f.tB_mats)===JSON.stringify(f.tA_mats)&&f.tB_tt===f.tA_tt&&f.tB_co===f.tA_co&&f.tB_mu===f.tA_mu&&f.tB_ma===f.tA_ma;
        f={...f,tB_igual:!!eq};
      }
      // V51: REGLA TNT — solo TNT 15 y TNT 30 permitidos, eliminar otras variantes
      const fixTNT=arr=>arr?arr.map(v=>/^TNT/i.test(v)&&v!=="TNT 15"&&v!=="TNT 30"?"":v):arr;
      f={...f,tA_mats:fixTNT(f.tA_mats),tB_mats:fixTNT(f.tB_mats),pl_mats:fixTNT(f.pl_mats)};
      // V51: REGLA ESPUMA CONVENCIONAL — en tapas siempre "ESPUMA CONVENCIONAL 2cm", en platabanda siempre "ESPUMA CONVENCIONAL 1 cm"
      const fixEC_tapa=arr=>arr?arr.map(v=>/^ESPUMA CONVENCIONAL$/i.test(v)||/^ESPUMA CONVENCIONAL 1/i.test(v)?"ESPUMA CONVENCIONAL 2cm":v):arr;
      const fixEC_plat=arr=>arr?arr.map(v=>/^ESPUMA CONVENCIONAL$/i.test(v)||/^ESPUMA CONVENCIONAL 2cm/i.test(v)?"ESPUMA CONVENCIONAL 1 cm":v):arr;
      f={...f,tA_mats:fixEC_tapa(f.tA_mats),tB_mats:fixEC_tapa(f.tB_mats),pl_mats:fixEC_plat(f.pl_mats)};
      // V51: REGLA TNT15→MULTIAGUJAS, TNT30→TAPA TAPA o MASTERTRON (respetar lo que ya tenga)
      if(f.tA_mats&&f.tA_mats.some(v=>v==="TNT 15")){if(!f.tA_mu&&!f.tA_ma)f={...f,tA_mu:true};}
      if(f.tB_mats&&f.tB_mats.some(v=>v==="TNT 15")){if(!f.tB_mu&&!f.tB_ma)f={...f,tB_mu:true};}
      // V73: Auto-move BOX from last nu_comp to nu_sop
      {
        const comps = f.nu_comp || [];
        if (comps.length > 0) {
          const last = comps[comps.length - 1];
          const mat = typeof last === "string" ? last : (last && last.mat) || "";
          if (mat.toUpperCase().includes("BOX") && (!f.nu_sop || f.nu_sop === "")) {
            f = {...f, nu_sop: mat, nu_comp: comps.slice(0, -1)};
          }
        }
      }
      // V74: Add pl_vivo, pl_vivo_col, pl_rib, pl_rib_col, as_vivo_col fields
      if(f.pl_vivo===undefined) f={...f,pl_vivo:false,pl_vivo_col:""};
      if(f.pl_rib===undefined) f={...f,pl_rib:false,pl_rib_col:""};
      if(f.as_vivo_col===undefined) f={...f,as_vivo_col:""};
      // V75: Add ban_has_vivo, ban_vivo_col, ban_rib_col fields
      if(f.ban_has_vivo===undefined) f={...f,ban_has_vivo:false};
      if(f.ban_vivo_col===undefined) f={...f,ban_vivo_col:""};
      if(f.ban_rib_col===undefined) f={...f,ban_rib_col:""};
      // V76: Add pl_alt_manual field
      if(f.pl_alt_manual===undefined) f={...f,pl_alt_manual:""};
      // V77: Restaurar "20CM D21" en HANOI si fue eliminado por cascada
      if(f.id==="hanoi_001"&&Array.isArray(f.nu_comp)){
        const has20=f.nu_comp.some(c=>{const m=typeof c==="string"?c:(c&&c.mat)||"";return/^20\s*CM\s*D[- ]?21$/i.test(m);});
        if(!has20) f={...f,nu_comp:[{mat:"20CM D21",alt:"20"},...f.nu_comp]};
      }
      return f;
    });
    } // cierre del else (merge antiguo)
  }
  // --- OPCIONES ---
  let opts;
  const storedOpts=lsLoad(LS_OPTS,null);
  if(!storedOpts){
    // Primera vez: usar catálogo base D0
    opts={};
    for(const k of Object.keys(D0)){opts[k]=[...D0[k]];}
  } else {
    // Siempre usar lo guardado como base (respeta renames/deletes del usuario)
    opts={};
    for(const k of Object.keys(storedOpts)){opts[k]=[...storedOpts[k]];}
    // En versión nueva: añadir items NUEVOS de D0 que no existan aún
    // PERO respetar items que el usuario eliminó manualmente
    const deletedOpts=lsLoad(LS_DELETED,{});
    // V77: Quitar "20CM D21" de la lista de eliminados para que se restaure
    if(deletedOpts.n&&deletedOpts.n.includes("20CM D21")){deletedOpts.n=deletedOpts.n.filter(v=>v!=="20CM D21");lsSave(LS_DELETED,deletedOpts);}
    if(isNew){
      for(const k of Object.keys(D0)){
        const del=new Set(deletedOpts[k]||[]);
        if(!opts[k]){opts[k]=D0[k].filter(v=>!del.has(v));}
        else{const s=new Set(opts[k]);for(const v of D0[k])if(!s.has(v)&&!del.has(v))opts[k].push(v);}
      }
    } else {
      // Sin versión nueva: asegurar que las categorías de D0 existan
      for(const k of Object.keys(D0)){if(!opts[k])opts[k]=[...D0[k]];}
    }
  }
  // V43: Limpiar objetos {mat,alt} que se hayan colado en catálogos (solo strings permitidos)
  for(const k of Object.keys(opts)){opts[k]=opts[k].filter(v=>typeof v==="string"&&v);}
  // Deduplicar: eliminar entradas repetidas en todos los catálogos
  for(const k of Object.keys(opts)){opts[k]=[...new Set(opts[k])];}
  // V77: Asegurar que "20CM D21" existe en catálogo Núcleo (pudo ser eliminado por cascada)
  if(opts.n&&!opts.n.includes("20CM D21")){opts.n.push("20CM D21");}
  // V19: Eliminar "FIBRA" sin gramaje del catálogo de materiales (solo FIBRA 100/200/300 son válidos)
  if(opts.mt) opts.mt=opts.mt.filter(v=>v!=="FIBRA");
  // V78: Limpiar "FIBRA" sin gramaje de TODAS las fichas (67 fichas afectadas)
  // También normalizar variantes: FIBRA100→FIBRA 100, FIBRAS 200→FIBRA 200, FIBRA300→FIBRA 300
  const _normFibra=arr=>{
    if(!Array.isArray(arr))return arr;
    return arr.map(v=>{
      const s=typeof v==="string"?v:(v&&v.mat)||"";
      if(s==="FIBRA")return null; // Eliminar FIBRA sin gramaje
      if(/^FIBRA(\d+)$/i.test(s))return typeof v==="string"?"FIBRA "+s.match(/(\d+)/)[1]:{...v,mat:"FIBRA "+s.match(/(\d+)/)[1]}; // FIBRA100→FIBRA 100
      if(/^FIBRAS\s+(\d+)$/i.test(s)){const n=s.match(/(\d+)/)[1];return typeof v==="string"?"FIBRA "+n:{...v,mat:"FIBRA "+n};} // FIBRAS 200→FIBRA 200
      return v;
    }).filter(Boolean);
  };
  // V78: Normalizar variantes en catálogo también
  if(opts.mt){
    opts.mt=opts.mt.map(v=>{
      if(/^FIBRA(\d+)$/i.test(v))return "FIBRA "+v.match(/(\d+)/)[1];
      if(/^FIBRAS\s+(\d+)$/i.test(v))return "FIBRA "+v.match(/(\d+)/)[1];
      return v;
    });
    opts.mt=[...new Set(opts.mt)]; // Deduplicar
  }
  // V38: Eliminar "ESPUMA CONVENCIONAL x1" del catálogo y reemplazar por "ESPUMA CONVENCIONAL 1 cm" en fichas
  if(opts.mt) opts.mt=opts.mt.filter(v=>v!=="ESPUMA CONVENCIONAL x1");
  // V51: Limpiar catálogo — solo TNT 15 y TNT 30
  if(opts.mt) opts.mt=opts.mt.filter(v=>!(/^TNT/i.test(v)&&v!=="TNT 15"&&v!=="TNT 30"));
  // V51: Eliminar "ESPUMA CONVENCIONAL" sola del catálogo (solo permitir con número)
  if(opts.mt) opts.mt=opts.mt.filter(v=>v!=="ESPUMA CONVENCIONAL");
  if(!skipMigrations){
    const _replX1=arr=>arr?arr.map(v=>v==="ESPUMA CONVENCIONAL x1"?"ESPUMA CONVENCIONAL 1 cm":v):arr;
    fichas=fichas.map(f=>{
      let changed=false;
      const tA=_replX1(f.tA_mats);if(tA!==f.tA_mats){f={...f,tA_mats:tA};changed=true;}
      const tB=_replX1(f.tB_mats);if(tB!==f.tB_mats){f={...f,tB_mats:tB};changed=true;}
      const pl=_replX1(f.pl_mats);if(pl!==f.pl_mats){f={...f,pl_mats:pl};changed=true;}
      // V78: Limpiar FIBRA sin gramaje y normalizar variantes en fichas
      const tA2=_normFibra(f.tA_mats);const tB2=_normFibra(f.tB_mats);const pl2=_normFibra(f.pl_mats);const nc2=_normFibra(f.nu_comp);
      if(JSON.stringify(tA2)!==JSON.stringify(f.tA_mats))f={...f,tA_mats:tA2};
      if(JSON.stringify(tB2)!==JSON.stringify(f.tB_mats))f={...f,tB_mats:tB2};
      if(JSON.stringify(pl2)!==JSON.stringify(f.pl_mats))f={...f,pl_mats:pl2};
      if(JSON.stringify(nc2)!==JSON.stringify(f.nu_comp))f={...f,nu_comp:nc2};
      return f;
    });
  }
  // Guardar versión actual
  lsSave(LS_VER,DATA_VERSION);
  lsSave(LS_FICHAS,fichas);
  return{fichas,opts};
}

  useEffect(()=>{

        const keys=[];
        for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith("korflex_backup_"))keys.push(k);}
        keys.sort();while(keys.length>3){localStorage.removeItem(keys.shift());}

              {(() => {
                const nuAlt = parseFloat(f.nu_alt || 0);
                const hasTapaA = !!(f.tA_tej || f.tA_dib || (Array.isArray(f.tA_mats) && f.tA_mats.length > 0));
                const hasTapaB = !!(f.tB_tej || f.tB_dib || (Array.isArray(f.tB_mats) && f.tB_mats.length > 0));

                const altPlatabanda = nucleoTotalHeight + (hasTapaA ? 2 : 0) + (tapaBComplex ? 2 : (tapaBSimple ? 1 : 0));
                const hasManual = f.pl_alt_manual && f.pl_alt_manual.trim() !== "";
                return hasManual ? f.pl_alt_manual + " cm" : altPlatabanda + " cm";

  // MATERIAL LIST con botones subir/bajar/eliminar
  const matList=(items,setItems,catKey,label,addLabel,alts,setAlts)=>{
    const swap=(a,b)=>{const n=[...items];[n[a],n[b]]=[n[b],n[a]];setItems(n);if(alts&&setAlts){const na=[...(alts||[])];[na[a],na[b]]=[na[b],na[a]];setAlts(na);}};

        const autoH=exH(it);

        <span style={{fontSize:12,color:"#666",minWidth:20,textAlign:"right"}}>{i+1}.</span>
        {sdd(it,v=>{const n=[...items];n[i]=v;setItems(n);if(alts&&setAlts){const na=[...(alts||[])];if(!na[i])na[i]="";setAlts(na);}},catKey,"Buscar...")}

      </div>;})}

        :(() => {
          const val=delModal.val;const cat=delModal.cat;
          const arrayFields={mt:["tA_mats","tB_mats","pl_mats"],n:["nu_comp"]};
          const stringFields={t:["tA_tej","tB_tej","pl_tej","as_tej","ban_tej"],d:["tA_dib","tB_dib","pl_dib"],r:["rib_col","frib_col","pl_rib_col","ban_rib_col"],c:["cliente"],m:["modelo"],ch:["crem_col","fcrem_col"],sp:["nu_sop"],a:["as_bord","as_tej"],vi:["pl_vivo_col","as_vivo_col","ban_vivo_col"]};
          const fieldLabels={tA_tej:"Tejido Tapa A",tB_tej:"Tejido Tapa B",pl_tej:"Tejido Platabanda",as_tej:"Tejido Asas",ban_tej:"Tejido Bandera",tA_dib:"Dibujo Tapa A",tB_dib:"Dibujo Tapa B",pl_dib:"Dibujo Platabanda",tA_mats:"Materiales Tapa A",tB_mats:"Materiales Tapa B",pl_mats:"Materiales Platabanda",nu_comp:"Composición Núcleo",rib_col:"Ribete",frib_col:"Funda Ribete",pl_rib_col:"Ribete Platabanda",ban_rib_col:"Ribete Bandera",cliente:"Cliente",modelo:"Modelo",crem_col:"Color Cremallera",fcrem_col:"Color Funda Cremallera",nu_sop:"Soporte",as_bord:"Bordado Asas",pl_vivo_col:"Vivo Platabanda",as_vivo_col:"Vivo Asas",ban_vivo_col:"Vivo Bandera"};
          const catNames={m:"Modelos",c:"Clientes",t:"Tejidos",d:"Dibujos",mt:"Materiales Tapa",r:"Ribetes",a:"Asas",n:"Núcleo",ch:"Colores Hilo",sp:"Soportes",vi:"Vivos"};
          const affected=[];

              for(const field of arrayFields[cat]){

                  const has=s[field].some(v=>typeof v==="string"?v===val:(v&&v.mat===val));

                  if(s.pl_tej.includes(val))campos.push(fieldLabels[field]||field);
                }
              }
            }
            if(stringFields[cat]){
              for(const field of stringFields[cat]){
                if(Array.isArray(s[field])){
                  if(s[field].includes(val))campos.push(fieldLabels[field]||field);
                } else if(s[field]===val)campos.push(fieldLabels[field]||field);
              }

            if(campos.length>0)affected.push({modelo:s.modelo||"(sin modelo)",cliente:s.cliente||"",campos});
          });
          return <div style={{fontSize:14,marginBottom:16}}>

      {/* BUSCADOR DE MATERIALES */}
      {page==="search"&&(()=>{
        // fl es ahora {key: [array de valores seleccionados]}
        const fl=matFilters;const setFl=setMatFilters;
        const filtersOpen=matFiltersOpen;
        const quick=matQuick;

        // Definición de campos — organizados por sección con colores como v2
        const sections=[
          {name:"General",color:"#1F3864",fields:[
            {key:"cliente",label:"CLIENTE",get:s=>[s.cliente||""]},
            {key:"modelo",label:"MODELO",get:s=>[s.modelo||""]},
          ]},
          {name:"Núcleo",color:"#2E7D32",fields:[
            {key:"nu_comp",label:"COMPOSICIÓN",get:s=>(s.nu_comp||[]).map(v=>typeof v==="string"?v:(v&&v.mat)||"")},
            {key:"nu_sop",label:"SOPORTE",get:s=>[s.nu_sop||""]},
            {key:"nu_alt",label:"ALTURA",get:s=>[s.nu_alt||""]},
            {key:"nu_desc",label:"DESCRIPCIÓN",get:s=>[s.nu_desc||""]},
          ]},
          {name:"Tapa A",color:"#1B5E20",fields:[
            {key:"tA_tej",label:"TEJIDO",get:s=>Array.isArray(s.tA_tej)?s.tA_tej:[s.tA_tej||""]},
            {key:"tA_dib",label:"DIBUJO",get:s=>Array.isArray(s.tA_dib)?s.tA_dib:[s.tA_dib||""]},
            {key:"tA_mats",label:"MATERIALES",get:s=>(s.tA_mats||[]).map(v=>typeof v==="string"?v:(v&&v.mat)||"")},
          ]},
          {name:"Tapa B",color:"#558B2F",fields:[
            {key:"tB_tej",label:"TEJIDO",get:s=>Array.isArray(s.tB_tej)?s.tB_tej:[s.tB_tej||""]},
            {key:"tB_dib",label:"DIBUJO",get:s=>Array.isArray(s.tB_dib)?s.tB_dib:[s.tB_dib||""]},
            {key:"tB_mats",label:"MATERIALES",get:s=>(s.tB_mats||[]).map(v=>typeof v==="string"?v:(v&&v.mat)||"")},
          ]},
          {name:"Platabanda",color:"#4E342E",fields:[
            {key:"pl_tej",label:"TEJIDO",get:s=>Array.isArray(s.pl_tej)?s.pl_tej:[s.pl_tej||""]},
            {key:"pl_dib",label:"DIBUJO",get:s=>Array.isArray(s.pl_dib)?s.pl_dib:[s.pl_dib||""]},
            {key:"pl_mats",label:"MATERIALES",get:s=>(s.pl_mats||[]).map(v=>typeof v==="string"?v:(v&&v.mat)||"")},
            {key:"pl_bord",label:"BORDADO",get:s=>[s.pl_bord||""]},
            {key:"pl_seri",label:"SERIGRAFÍA",get:s=>[s.pl_seri||""]},
          ]},
          {name:"Acabados",color:"#455A64",fields:[
            {key:"rib_col",label:"RIBETE",get:s=>[s.rib_col||""]},
            {key:"pl_vivo_col",label:"VIVO PB",get:s=>[s.pl_vivo_col||""]},
            {key:"as_bord",label:"BORDADO ASAS",get:s=>[s.as_bord||""]},
            {key:"as_tej",label:"TEJIDO ASAS",get:s=>[s.as_tej||""]},
            {key:"ban_tej",label:"TEJIDO BANDERA",get:s=>[s.ban_tej||""]},
            {key:"obs",label:"OBSERVACIONES",get:s=>[s.obs||""]},
          ]},
        ];
        const allFields=sections.flatMap(s=>s.fields);

        // Valores únicos por campo
        const getUniq=(key)=>{
          const sf=allFields.find(f=>f.key===key);if(!sf)return[];
          const s=new Set();saved.forEach(r=>sf.get(r).forEach(v=>{if(v&&v.trim())s.add(v.trim());}));
          return[...s].sort((a,b)=>a.localeCompare(b,"es"));
        };

        // Añadir valor a un filtro multi-valor
        const addFilterVal=(key,val)=>{
          const v=val.trim();if(!v)return;
          setFl(p=>{
            const arr=p[key]||[];
            if(arr.some(x=>x.toLowerCase()===v.toLowerCase()))return p;
            return{...p,[key]:[...arr,v]};
          });
        };
        // Quitar valor de un filtro
        const removeFilterVal=(key,val)=>{
          setFl(p=>{
            const arr=(p[key]||[]).filter(x=>x!==val);
            const n={...p};
            if(arr.length===0)delete n[key];else n[key]=arr;
            return n;
          });
        };

        // Filtrar — ahora fl[k] es un array de valores
        const activeKeys=Object.keys(fl).filter(k=>Array.isArray(fl[k])&&fl[k].length>0);
        const quickLow=quick.toLowerCase().trim();

        let results=saved;
        // Búsqueda rápida (busca en TODOS los campos)
        if(quickLow){

        }
        // Filtros por campo: AND entre campos, OR dentro del mismo campo
        if(activeKeys.length>0){
          results=results.filter(s=>activeKeys.every(k=>{
            const sf=allFields.find(f=>f.key===k);if(!sf)return true;
            const searchVals=fl[k].map(v=>v.toLowerCase());
            // OR: la ficha coincide si tiene al menos UNO de los valores seleccionados
            return searchVals.some(sv=>sf.get(s).some(v=>(v||"").toLowerCase().includes(sv)));
          }));

        const totalFilterVals=activeKeys.reduce((n,k)=>n+fl[k].length,0);

        // Columnas dinámicas para resultados
        const baseCols=[

          return sf?{key:k,label:sf.label,get:s=>sf.get(s).filter(v=>v).join(", ")}:null;
        }).filter(Boolean);
        const tableCols=[...baseCols,...extraCols];

        // Exportar a CSV/Excel
        const exportSearch=()=>{
          const header=tableCols.map(c=>c.label).join("\t");
          const rows=results.map(s=>tableCols.map(c=>c.get(s)).join("\t"));
          const tsv=header+"\n"+rows.join("\n");
          const blob=new Blob(["\uFEFF"+tsv],{type:"text/tab-separated-values;charset=utf-8"});

          const a=document.createElement("a");a.href=url;a.download="busqueda_korflex.xls";a.click();URL.revokeObjectURL(url);

            <input type="text" value={quick} onChange={e=>setMatQuick(e.target.value)}

                    </div>
                    <datalist id={"s_"+sf.key}>{getUniq(sf.key).filter(v=>!vals.includes(v)).map(v=><option key={v} value={v}/>)}</datalist>

            {results.length>0?<div style={{background:"#fff",borderRadius:10,boxShadow:"0 2px 8px rgba(0,0,0,.08)",overflow:"auto",maxHeight:"60vh"}}>

      {/* EDIT FORM (solo admin) */}

        const _rv=f._rev||[];

        return <div style={{maxWidth:920,margin:"0 auto"}}>
        <div style={{background:"#1F3864",color:"#fff",padding:"12px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",borderRadius:"8px 8px 0 0",flexWrap:"wrap",gap:8}}>

          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>

            <button className="btn btn-md btn-green" onClick={saveFicha}>{editId?"Actualizar":"Guardar"}</button>
            {editId&&<button className="btn btn-md" style={{background:"#E3F2FD",color:"#1565C0",border:"1.5px solid #42A5F5",fontWeight:700,fontSize:11}} onClick={duplicarFicha}>⧉ Duplicar</button>}<button className="btn btn-md" style={{background:"#fff",color:"#1F3864"}} onClick={()=>safNav(()=>setPage("preview"))}>Vista Previa</button>
            <button className="btn btn-md" style={{background:f.activo===false?"#FFCDD2":"#C8E6C9",color:f.activo===false?"#B71C1C":"#2E7D32",border:f.activo===false?"1.5px solid #E53935":"1.5px solid #4CAF50",fontWeight:700,fontSize:11,cursor:"pointer"}} onClick={()=>{setF(p=>({...p,activo:p.activo===false?true:false}));setDirty(true);}}>{f.activo===false?"INACTIVA":"ACTIVA"}</button>
            {editId&&admin&&<button className="btn btn-md btn-red" onClick={()=>setDelModal({type:"ficha",id:editId,val:f.modelo||"esta ficha"})}>🗑 Eliminar</button>}            <button className="btn btn-md btn-gray" onClick={()=>safNav(()=>setPage("home"))}>Cerrar</button>
          </div>
        </div>
        <div style={{background:"#F8F9FC",padding:16,border:"1.5px solid #8DB4E2",borderTop:"none",borderRadius:"0 0 8px 8px"}}>
          <div className="sec-light">DATOS GENERALES</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            <FRow label="CLIENTE" w={65} {...rv("cliente")}>{sdd(f.cliente,u("cliente"),"c","Buscar cliente...")}</FRow>
            <FRow label="MODELO" w={65} {...rv("modelo")}>{sdd(f.modelo,u("modelo"),"m","Buscar modelo...")}</FRow>
            <FInp label="CODIGO" value={f.codigo} onChange={u("codigo")} ph="C193" w={65} {...rv("codigo")}/>
            <FInp label="FECHA" value={f.fecha} onChange={u("fecha")} ph="16/03/2026" w={65} {...rv("fecha")}/>
            <FInp label="ALTURA" value={f.alturaTotal} onChange={u("alturaTotal")} ph="28.8 cm" w={65} {...rv("alturaTotal")}/>
            <div style={{fontSize:10,color:"#2E7D32",fontWeight:700}} title="Se actualiza automáticamente al cambiar materiales/alturas">&#8644; auto</div>
          </div>

          <div className="zone-nucleo"><div className="sec-head-nucleo">NUCLEO</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 120px",gap:6}}>
            <FInp label="TIPO" value={f.nu_desc||""} onChange={u("nu_desc")} ph="Ej: D-21, BOREAL" w={50} {...rv("nu_desc")}/>

            <FChk label="ESPUMA" checked={f.nu_esp} onChange={u("nu_esp")}/><FChk label="MUELLES" checked={f.nu_mue} onChange={u("nu_mue")}/>
            <FRow label="SOPORTE" w={65} {...rv("nu_sop")}>{sdd(f.nu_sop,u("nu_sop"),"sp","Soporte...")}</FRow>
            
          </div>
          {/* Composición núcleo con altura editable */}
          {(()=>{
            const items=f.nu_comp||[];
            const setItems=v=>uArr("nu_comp",v);
            const swap=(a,b)=>{const n=[...items];[n[a],n[b]]=[n[b],n[a]];setItems(n);};
            return(
            <div style={{marginBottom:6}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1F3864",marginBottom:4}}>Composicion Nucleo (en orden)</div>
              {(() => {
                // Filter: skip last comp if it's BOX DURO/BLANDO (shown in soporte)
                const filteredItems = items.filter((c, i) => {
                  if (i === items.length - 1) {
                    const mat = (typeof c === "string" ? c : (c && c.mat) || "").trim();
                    // Solo ocultar si es EXACTAMENTE "BOX DURO" o "BOX BLANDO" (se mueve a Soporte)
                    if (/^BOX\s+(DURO|BLANDO)\s*$/i.test(mat)) return false;
                  }
                  return true;
                });
                return filteredItems.map((it,i)=>{
                  const obj=typeof it==="string"?{mat:it,alt:""}:it;
                  const autoAlt=exH(obj.mat);
                  const dispAlt=obj.alt||autoAlt;
                  return <div key={i} style={{display:"flex",gap:4,marginBottom:4,alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#666",minWidth:20,textAlign:"right"}}>{i+1}.</span>
                  <div style={{flex:1}}>{sdd(obj.mat,v=>{const n=[...items];n[i]={...obj,mat:v,alt:exH(v)||obj.alt};setItems(n);},"n","Material nucleo...")}</div>
                  <input className="field-inp" style={{width:70,textAlign:"center",background:obj.alt?"#E3EDFA":(autoAlt?"#F0F4F8":"#fff"),fontWeight:dispAlt?700:400}} value={dispAlt} onChange={e=>{const n=[...items];n[i]={...obj,alt:e.target.value};setItems(n);}} placeholder="—"/>
                  {admin&&<div style={{display:"flex",flexDirection:"column",gap:1}}>
                    <button className="btn btn-sm" style={{background:"#B4C6E7",color:"#1F3864",padding:"1px 6px",fontSize:10,lineHeight:1}} disabled={i===0} onClick={()=>swap(i,i-1)} title="Subir">&uarr;</button>

                  </div>}

                </div>;

          </div>
          {matList(f.tA_mats||[],v=>uArr("tA_mats",v),"mt","Composicion Tapa A (en orden)",null,f.tA_alts||[],v=>setF(p=>({...p,tA_alts:v})))}
          <div className="chk-row"><FChk label="TAPA TAPA" checked={f.tA_tt} onChange={u("tA_tt")}/><FChk label="CONTINUO" checked={f.tA_co} onChange={u("tA_co")}/><FChk label="MULTIAGUJAS" checked={f.tA_mu} onChange={u("tA_mu")}/><FChk label="MASTERTRON" checked={f.tA_ma} onChange={u("tA_ma")}/></div>

          <div className="sec-head-tapas">ACOLCHADO - TAPA B</div>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:6}}>
            <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer",background:f.tB_igual?"#E3EDFA":"#f5f5f5",padding:"6px 14px",borderRadius:6,border:f.tB_igual?"2px solid #2F5496":"1.5px solid #ccc",fontWeight:700,fontSize:13,color:"#1F3864"}}>
              <input type="checkbox" checked={!!f.tB_igual} onChange={e=>{const v=e.target.checked;if(v){setF(p=>({...p,tB_igual:true,tB_tej:p.tA_tej,tB_dib:p.tA_dib,tB_mats:[...(p.tA_mats||[])],tB_alts:[...(p.tA_alts||[])],tB_tt:p.tA_tt,tB_co:p.tA_co,tB_mu:p.tA_mu,tB_ma:p.tA_ma}));}else{setF(p=>({...p,tB_igual:false}));}}} style={{width:18,height:18}}/> IGUAL TAPA A
            </label>
          </div>
          {!f.tB_igual&&<><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <FRow label="TEJIDO" w={60} {...rv("tB_tej")}>{sdd(f.tB_tej,u("tB_tej"),"t","Buscar tejido...")}</FRow>
            <FRow label="DIBUJO" w={60} {...rv("tB_dib")}>{sdd(f.tB_dib,u("tB_dib"),"d","Buscar dibujo...")}</FRow>
          </div>
          {matList(f.tB_mats||[],v=>uArr("tB_mats",v),"mt","Composicion Tapa B (en orden)",null,f.tB_alts||[],v=>setF(p=>({...p,tB_alts:v})))}
          <div className="chk-row"><FChk label="TAPA TAPA" checked={f.tB_tt} onChange={u("tB_tt")}/><FChk label="CONTINUO" checked={f.tB_co} onChange={u("tB_co")}/><FChk label="MULTIAGUJAS" checked={f.tB_mu} onChange={u("tB_mu")}/><FChk label="MASTERTRON" checked={f.tB_ma} onChange={u("tB_ma")}/></div></>}

          </div>{/* end zone-tapas */}<div className="zone-plata"><div className="sec-head-plata">PLATABANDA</div>
          {Array.isArray(f.pl_tej)?<>{f.pl_tej.map((t,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"3fr 1fr auto",gap:4,marginBottom:2,alignItems:"flex-end"}}>
            <FRow label={i===0?"TEJIDO":""} w={60}>{sdd(t,v=>{const a=[...f.pl_tej];a[i]=v;u("pl_tej")(a);},"t","Tejido...")}</FRow>
            <FRow label={i===0?"FRAC.":""} w={40}><input className="inp" value={(Array.isArray(f.pl_comp)?f.pl_comp[i]:"")||""} onChange={e=>{const a=Array.isArray(f.pl_comp)?[...f.pl_comp]:[];a[i]=e.target.value;u("pl_comp")(a);}} placeholder="1/3" style={{width:"100%"}}/></FRow>
            {admin&&<button className="btn btn-sm btn-red" style={{padding:"3px 7px",fontSize:13,marginBottom:1}} title="Eliminar este tejido" onClick={()=>{const nt=[...f.pl_tej];nt.splice(i,1);const nc=Array.isArray(f.pl_comp)?[...f.pl_comp]:[];nc.splice(i,1);if(nt.length===1){u("pl_tej")(nt[0]);u("pl_comp")(nc[0]||"");}else if(nt.length===0){u("pl_tej")("");u("pl_comp")("");}else{u("pl_tej")(nt);u("pl_comp")(nc);}}}>&times;</button>}
          </div>)}
            {admin&&<div style={{display:"flex",gap:4,marginBottom:4}}><button className="btn btn-sm btn-blue" style={{fontSize:10}} onClick={()=>{u("pl_tej")([...f.pl_tej,""]);const c=Array.isArray(f.pl_comp)?[...f.pl_comp]:[];c.push("");u("pl_comp")(c);}}>+ Tejido</button></div>}
          </>:<><FRow label="TEJIDO" w={60}>{sdd(f.pl_tej||"",u("pl_tej"),"t","Tejido platabanda...")}</FRow>
            {admin&&<button className="btn btn-sm btn-blue" style={{marginBottom:4,fontSize:10}} onClick={()=>{u("pl_tej")(f.pl_tej?[f.pl_tej,""]:[""]);u("pl_comp")(["",""]);}}>+ Multi-tejido (fracciones)</button>}</>}
          {Array.isArray(f.pl_dib)?matList(f.pl_dib,v=>uArr("pl_dib",v),"d","Dibujos Platabanda (en orden)","Agregar dibujo"):<><FRow label="DIBUJO" w={60}>{sdd(f.pl_dib||"",v=>{u("pl_dib")(v);},"d","Dibujo...")}</FRow>{admin&&<button className="btn btn-sm btn-blue" style={{marginBottom:4,fontSize:10}} onClick={()=>{const cur=f.pl_dib?[f.pl_dib]:[];uArr("pl_dib",[...cur,""]);}}>+ Multi-dibujo</button>}</>}
          {matList(f.pl_mats||[],v=>uArr("pl_mats",v),"mt","Composicion Platabanda (en orden)")}
          {/* COMP. TEXTO solo en modo tejido único — en multi-tejido las fracciones van inline */}
          {!Array.isArray(f.pl_tej)&&<FInp label="COMP. TEXTO" value={f.pl_comp} onChange={u("pl_comp")} ph="1/3 LONETA + 2/3 MICRO (texto libre)" w={85}/>}
          <div className="chk-row"><FChk label="ULTRASONICO" checked={f.pl_ultra} onChange={v=>setF(p=>({...p,pl_ultra:v,pl_multi:v?false:p.pl_multi}))}/><FChk label="MULTIAGUJAS" checked={f.pl_multi} onChange={v=>setF(p=>({...p,pl_multi:v,pl_ultra:v?false:p.pl_ultra}))}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            <FInp label="BORDADO" value={f.pl_bord||""} onChange={u("pl_bord")} ph="Bordado platabanda" w={65}/>
            <FInp label="SERIGRAFÍA" value={f.pl_seri||""} onChange={u("pl_seri")} ph="Serigrafía" w={70}/>
            <FInp label="UBICACIÓN" value={f.pl_ubic||""} onChange={u("pl_ubic")} ph="Ubicación" w={70}/>
          </div>
          <div className="sec-head-plata">COMPOSICIÓN ASAS</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
            <FInp label="BORDADO" value={f.as_bord} onChange={u("as_bord")} ph="2 BORDADA KORFLEX" w={65}/>
            <FRow label="Nº ASAS" w={55}>{sdd(f.as_n,u("as_n"),"a","Nº asas...")}</FRow>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,alignItems:"center"}}>
            <FInp label="SERIGRAFÍA" value={f.as_seri} onChange={u("as_seri")} ph="Serigrafía asas" w={70}/>
            <FRow label="TEJIDO" w={50}>{sdd(f.as_tej||"",u("as_tej"),"t","Tejido asas...")}</FRow>
          </div>
          <div className="chk-row"><FChk label="HORIZ" checked={f.as_horiz} onChange={u("as_horiz")}/><FChk label="VERT" checked={f.as_vert} onChange={u("as_vert")}/></div>
          <FInp label="ETIQUETA" value={f.as_etiq||""} onChange={u("as_etiq")} ph="Etiqueta de asas" w={70}/>

          <div style={{fontSize:11,fontWeight:700,color:"#7B1FA2",marginTop:8,marginBottom:4,borderTop:"1.5px solid #CE93D8",paddingTop:4,letterSpacing:1}}>ACABADOS PLATABANDA</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,alignItems:"start"}}>
            <div style={{background:"#f3e5f5",border:"1.5px solid #CE93D8",borderRadius:6,padding:8}}>
              <div style={{fontSize:10,fontWeight:700,color:"#7B1FA2",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>PLATABANDA</div>
              <FChk label="VIVO" checked={!!f.pl_vivo} onChange={v=>{setF(p=>({...p,pl_vivo:v}));setDirty(true);}}/>
              {f.pl_vivo&&<div style={{marginTop:4}}>{sdd(f.pl_vivo_col||"",(v)=>{setF(p=>({...p,pl_vivo_col:v}));setDirty(true);},"vi","Tipo vivo...")}</div>}
              <div style={{marginTop:6}}><FChk label="RIBETE" checked={!!f.pl_rib} onChange={v=>{setF(p=>({...p,pl_rib:v}));setDirty(true);}}/></div>
              {f.pl_rib&&<div style={{marginTop:4}}>{sdd(f.pl_rib_col||"",(v)=>{setF(p=>({...p,pl_rib_col:v}));setDirty(true);},"r","Color ribete...")}</div>}
            </div>
            <div style={{background:"#f3e5f5",border:"1.5px solid #CE93D8",borderRadius:6,padding:8}}>
              <div style={{fontSize:10,fontWeight:700,color:"#7B1FA2",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>ASAS</div>
              <FChk label="VIVO" checked={!!f.as_vivo} onChange={v=>{setF(p=>({...p,as_vivo:v}));setDirty(true);}}/>
              {f.as_vivo&&<div style={{marginTop:4}}>{sdd(f.as_vivo_col||"",(v)=>{setF(p=>({...p,as_vivo_col:v}));setDirty(true);},"vi","Tipo vivo...")}</div>}
            </div>
            <div style={{background:"#f3e5f5",border:"1.5px solid #CE93D8",borderRadius:6,padding:8}}>
              <div style={{fontSize:10,fontWeight:700,color:"#7B1FA2",marginBottom:4,textTransform:"uppercase",letterSpacing:0.5}}>BANDERA</div>
              <FChk label="BANDERA" checked={!!f.ban_vivo} onChange={v=>{setF(p=>({...p,ban_vivo:v,ban_has_vivo:v?p.ban_has_vivo:false,ban_vivo_col:v?p.ban_vivo_col:"",ban_rib:v?p.ban_rib:false,ban_rib_col:v?p.ban_rib_col:""}));setDirty(true);}}/>
              {f.ban_vivo&&<div style={{marginTop:4}}>{sdd(f.ban_tej||"",(v)=>{setF(p=>({...p,ban_tej:v}));setDirty(true);},"t","Tejido bandera...")}</div>}
              {f.ban_vivo&&<div style={{marginTop:6}}><FChk label="VIVO" checked={!!f.ban_has_vivo} onChange={v=>{setF(p=>({...p,ban_has_vivo:v,ban_vivo_col:v?p.ban_vivo_col:""}));setDirty(true);}}/></div>}
              {f.ban_vivo&&f.ban_has_vivo&&<div style={{marginTop:4}}>{sdd(f.ban_vivo_col||"",(v)=>{setF(p=>({...p,ban_vivo_col:v}));setDirty(true);},"vi","Tipo vivo...")}</div>}
              {f.ban_vivo&&<div style={{marginTop:6}}><FChk label="RIBETE" checked={!!f.ban_rib} onChange={v=>{setF(p=>({...p,ban_rib:v,ban_rib_col:v?p.ban_rib_col:""}));setDirty(true);}}/></div>}
              {f.ban_vivo&&f.ban_rib&&<div style={{marginTop:4}}>{sdd(f.ban_rib_col||"",(v)=>{setF(p=>({...p,ban_rib_col:v}));setDirty(true);},"r","Color ribete...")}</div>}
            </div>
          </div>

<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #ddd"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#1F3864",marginBottom:6}}>ALTURA PLATABANDA</div>
            {(() => {
              const nuAlt = parseFloat(f.nu_alt || 0);
              const hasTapaA = !!(f.tA_tej || f.tA_dib || (Array.isArray(f.tA_mats) && f.tA_mats.length > 0));
              const hasTapaB = !!(f.tB_tej || f.tB_dib || (Array.isArray(f.tB_mats) && f.tB_mats.length > 0));
              
              // Tapa B simple = tejido contains 2D or 3D AND no materials
              const tB_tejido = (f.tB_tej || "").toUpperCase();
              const is2D3D = tB_tejido.includes("2D") || tB_tejido.includes("3D");
              const hasMats = Array.isArray(f.tB_mats) && f.tB_mats.length > 0;
              const tapaBSimple = hasTapaB && is2D3D && !hasMats;
              const tapaBComplex = hasTapaB && !tapaBSimple;
              
              // Igual que calcH: nu_alt + nu_comp se suman ambos
              let nucleoTotalHeight = nuAlt > 0 ? nuAlt : 0;
              (f.nu_comp || []).forEach(c => {
                const mat = typeof c === "string" ? c : (c && c.mat) || "";
                const alt = typeof c === "object" && c ? parseFloat(c.alt || 0) : 0;
                const h = alt > 0 ? alt : parseFloat(exH(mat) || 0);
                if (h && !isNaN(h)) nucleoTotalHeight += h;
              });
              const altPlatabanda = nucleoTotalHeight + (hasTapaA ? 2 : 0) + (tapaBComplex ? 2 : (tapaBSimple ? 1 : 0));
              const hasManual = f.pl_alt_manual && f.pl_alt_manual.trim() !== "";
              return (
                <div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <div style={{fontSize:13,fontWeight:"bold",padding:"5px 12px",background:"#512DA8",color:"#fff",borderRadius:4,minWidth:80,textAlign:"center"}}>
                      {hasManual ? <span style={{textDecoration:"line-through",opacity:0.6,fontSize:11,marginRight:4}}>{altPlatabanda} cm</span> : null}
                      {hasManual ? <span>{f.pl_alt_manual} cm</span> : <span>{altPlatabanda} cm</span>}
                    </div>
                    <div style={{fontSize:10,color:"#666",fontStyle:"italic"}}>← fórmula auto</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#7B1FA2",whiteSpace:"nowrap"}}>Altura manual:</span>
                    <input
                      type="number"
                      step="0.5"
                      min="0"
                      value={f.pl_alt_manual||""}
                      onChange={e=>{setF(p=>({...p,pl_alt_manual:e.target.value}));setDirty(true);}}
                      placeholder={String(altPlatabanda)}
                      style={{width:80,padding:"4px 8px",border:"1.5px solid "+(hasManual?"#F9A825":"#8DB4E2"),borderRadius:5,fontSize:13,fontWeight:hasManual?"bold":"normal",background:hasManual?"#FFF9C4":"#fff"}}
                    />
                    <span style={{fontSize:11,color:"#888"}}>cm</span>
                    {hasManual&&<button onClick={()=>{setF(p=>({...p,pl_alt_manual:""}));setDirty(true);}} style={{fontSize:11,padding:"2px 8px",background:"#ffebee",border:"1px solid #e57373",borderRadius:4,color:"#c62828",cursor:"pointer"}}>✕ borrar</button>}
                  </div>
                  {hasManual&&<div style={{fontSize:10,color:"#F9A825",marginTop:3,fontWeight:700}}>⚠ Altura manual activa — la fórmula queda como referencia</div>}
                </div>
              );
            })()}
          </div>
          
                    </div>{/* end zone-plata */}<div className="sec-head">CERRADO</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><FChk label="RIBETE" checked={!!f.rib} onChange={u("rib")}/>{f.rib&&sdd(f.rib_col,u("rib_col"),"r","Color...")}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><FChk label="FUNDA RIBETE" checked={!!f.frib} onChange={u("frib")}/>{f.frib&&sdd(f.frib_col,u("frib_col"),"r","Color...")}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><FChk label="FUN.CREMALLERA" checked={!!f.fcrem} onChange={u("fcrem")}/>{f.fcrem&&sdd(f.fcrem_col,u("fcrem_col"),"ch","Color...")}</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><FChk label="CREMALLERA" checked={!!f.crem} onChange={u("crem")}/>{f.crem&&sdd(f.crem_col,u("crem_col"),"ch","Color...")}</div>
          </div>
          <div className="chk-row" style={{gap:10,marginTop:6}}><FChk label="CAJA" checked={!!f.caja} onChange={u("caja")}/><FChk label="ENCARTE" checked={!!f.enc} onChange={u("enc")}/><FChk label="ENROLLADO" checked={!!f.enr} onChange={u("enr")}/><FChk label="ABIERTO" checked={!!f.abierto} onChange={u("abierto")}/></div>

          <div className="sec-light" style={{marginTop:10}}>OBSERVACIONES</div>
          <textarea value={f.obs} onChange={e=>setF(p=>({...p,obs:e.target.value}))}
            style={{width:"100%",height:55,fontSize:13,padding:8,border:"1.5px solid #8DB4E2",borderRadius:5,resize:"vertical"}} placeholder="Observaciones..."/>

          <div style={{display:"flex",gap:12,justifyContent:"center",marginTop:16}}>
            <button className="btn btn-lg btn-green" onClick={saveFicha}>{editId?"Actualizar Ficha":"Guardar Nueva Ficha"}</button>
            <button className="btn btn-lg btn-blue" onClick={()=>safNav(()=>setPage("preview"))}>Vista Previa / PDF</button>
          </div>
        </div>
      </div>})()}
      {/* BARRA FLOTANTE REVISIONES PENDIENTES — editor */}
      {page==="edit"&&admin&&f._rev?.length>0&&<div style={{position:"fixed",bottom:0,left:290,right:0,background:"rgba(255,205,210,0.95)",borderTop:"3px solid #E53935",padding:"10px 20px",display:"flex",justifyContent:"center",alignItems:"center",gap:16,zIndex:100}}>
        <span style={{fontSize:13,fontWeight:700,color:"#B71C1C"}}>Campos pendientes de revisar: {f._rev?.length||0}</span>
        <button className="btn btn-lg" style={{background:"#B71C1C",color:"#fff",fontWeight:700,padding:"8px 24px"}} onClick={()=>{const clean={_rev:[],_src:{}};setF(p=>({...p,...clean}));if(editId){setSaved(prev=>prev.map(s=>s.id===editId?{...s,...clean,_userEdited:true,_saved:new Date().toISOString()}:s));}showToast("Revisiones limpiadas");}}>Limpiar revisiones</button>
      </div>}

      {/* PREVIEW */}
      {page==="preview"&&<div style={{maxWidth:920,margin:"0 auto"}}>
        <div style={{display:"flex",gap:12,justifyContent:"center",padding:10,marginBottom:8}}>
          {admin&&<button className="btn btn-lg btn-gray" onClick={()=>setPage("edit")}>Volver a Editar</button>}
          {!admin&&<button className="btn btn-lg btn-gray" onClick={()=>setPage("home")}>Volver</button>}
          <button className="btn btn-lg btn-blue" onClick={doprint}>Descargar PDF</button>
          {f._rev?.length>0&&<button className="btn btn-lg" style={{background:"#FFCDD2",color:"#B71C1C",border:"2px solid #E53935",fontWeight:700}} onClick={()=>{const clean={_rev:[]};setF(p=>({...p,...clean}));if(editId){setSaved(prev=>prev.map(s=>s.id===editId?{...s,...clean,_userEdited:true,_saved:new Date().toISOString()}:s));}showToast("Revisiones limpiadas");}}>Revisión ({f._rev?.length||0})</button>}
        </div>
        <div style={{border:"2px solid #1F3864",borderRadius:6,overflow:"hidden"}}>{previewContent}</div>
        {admin&&f._rev?.length>0&&<div style={{position:"fixed",bottom:0,left:290,right:0,background:"rgba(255,205,210,0.95)",borderTop:"3px solid #E53935",padding:"10px 20px",display:"flex",justifyContent:"center",alignItems:"center",gap:16,zIndex:100}}>
          <span style={{fontSize:13,fontWeight:700,color:"#B71C1C"}}>Campos pendientes de revisar: {f._rev?.length||0}</span>
          <button className="btn btn-lg" style={{background:"#B71C1C",color:"#fff",fontWeight:700,padding:"8px 24px"}} onClick={()=>{const clean={_rev:[],_src:{}};setF(p=>({...p,...clean}));if(editId){setSaved(prev=>prev.map(s=>s.id===editId?{...s,...clean,_userEdited:true,_saved:new Date().toISOString()}:s));}showToast("Revisiones limpiadas");}}>Limpiar revisiones</button>
        </div>}
      </div>}

      {/* Redirect: if not admin tries to access edit, go to preview — handled by useEffect */}

    </div>
  </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={error:null};}
  static getDerivedStateFromError(e){return{error:e};}
  render(){if(this.state.error)return React.createElement("div",{style:{padding:40,textAlign:"center"}},
    React.createElement("h2",{style:{color:"#c00"}},"Error en la aplicación"),
    React.createElement("pre",{style:{color:"#666",fontSize:12,whiteSpace:"pre-wrap",margin:"16px auto",maxWidth:600}},String(this.state.error)),
    React.createElement("button",{onClick:()=>this.setState({error:null}),style:{padding:"8px 24px",fontSize:14,cursor:"pointer"}},"Reintentar"));
    return this.props.children;}
}
ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);




</script>
</body>
</html>
